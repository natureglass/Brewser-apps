<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>WebGL extensions/oes-standard-derivatives</title>
<style>
  body { background-color: #0b1220; color: #e0e8f4; font-size: 16px;
         text-align: center; }
  h1 { color: #ffd35e; font-size: 20px; }
  p.lead { color: #9bb1d6; font-size: 14px;
           max-width: 720px; margin-left: auto; margin-right: auto; }
  a { color: #7eda9f; }
  code { color: #ffd35e; }
</style>
</head>
<body>
<canvas id="example" width="50" height="50"></canvas>
<canvas id="khronos-status" width="900" height="540"></canvas>

<!--
  Port of WebGL/sdk/tests/conformance/extensions/oes-standard-derivatives.html
  for switch-web-browser. Pairs with the milestone-#16 webgl-loader-obj
  demo and pins the bridge's derivative-normals fallback + the
  OES_standard_derivatives extension exposure.

  Coverage: extension presence in getSupportedExtensions, getExtension
  returning a non-null object exposing the FRAGMENT_SHADER_DERIVATIVE_HINT_OES
  constant (0x8B8B), gl.hint() accepting the new pname and rejecting
  invalid modes / pnames, getParameter round-trip across all 3 hint
  modes, and an end-to-end output test that renders a screen-aligned
  quad through a passthrough shader using dFdx/dFdy + fwidth and asserts
  the rendered pixels match the expected linear gradient values.

  Adaptations from upstream:
    - js-test-pre.js / webgl-test-utils.js → harness.js
    - "Extension disabled" assertions skipped. nx.js exposes
      FRAGMENT_SHADER_DERIVATIVE_HINT_OES + accepts it in gl.hint()
      unconditionally (same model as ANGLE_instanced_arrays). The user
      still has to call getExtension to feature-detect, but the gating
      isn't enforced runtime-side.
    - Macro-presence shader test skipped. Our default shader compile
      path goes through nxjs's bridge program swap, not the user's
      shader; passthrough programs (`#pragma raw_passthrough`) do
      compile through native GLES, but `#ifdef GL_OES_standard_derivatives`
      preprocessor behavior depends on the GLES driver's compiler
      defines — we don't override those from JS. Output test below
      exercises the actual `dFdx`/`dFdy`/`fwidth` builtin functions
      under passthrough instead, which is the load-bearing functionality.
    - runUniqueObjectTest skipped. Our getExtension creates a fresh
      wrapper object per call (same pattern as ANGLE_instanced_arrays).
    - runDeferredLinkTests skipped. Tests cross-context behavior that
      doesn't apply (we have one shared GL context per page; see
      [[swb-webgl-inline]]).

  The output test uses `#pragma raw_passthrough` (per
  [[bridge-raw-shader-passthrough]]) so the custom shader actually runs
  on native GLES — without that, the bridge swaps in its own hardcoded
  fragment shader and the dFdx/dFdy calls never execute.
-->

<script>
  globalThis.__khronosTestName = 'extensions-oes-standard-derivatives';
</script>
<script src="brewser://apps/ThreeJSDemos/libs/harness.js"></script>

<script id="outputVertexShader" type="x-shader/x-vertex">
#pragma raw_passthrough
attribute vec4 vPosition;
varying vec4 position;
void main() {
    position = vPosition;
    gl_Position = vPosition;
}
</script>

<script id="outputFragmentShader" type="x-shader/x-fragment">
#pragma raw_passthrough
#extension GL_OES_standard_derivatives : enable
precision mediump float;
varying vec4 position;
void main() {
    float dzdx = dFdx(position.z);
    float dzdy = dFdy(position.z);
    float fw = fwidth(position.z);
    gl_FragColor = vec4(abs(dzdx) * 40.0, abs(dzdy) * 40.0, fw * 40.0, 1.0);
}
</script>

<script>
try {
  description('WebGL OES_standard_derivatives extension conformance');

  var wtu = WebGLTestUtils;
  var canvas = document.getElementById('example');
  var gl = wtu.create3DContext('example');
  assertMsg(gl != null, 'WebGL context exists');

  // --- Extension presence in getSupportedExtensions -------------------------
  var supported = gl.getSupportedExtensions();
  assertMsg(Array.isArray(supported), 'getSupportedExtensions() returns an array');
  assertMsg(supported.indexOf('OES_standard_derivatives') >= 0,
    'getSupportedExtensions() includes "OES_standard_derivatives"');

  // --- getExtension --------------------------------------------------------
  var ext = gl.getExtension('OES_standard_derivatives');
  assertMsg(ext != null, 'getExtension("OES_standard_derivatives") is non-null');
  if (!ext) { finishTest(); throw new Error('no ext'); }

  // --- Extension object shape ----------------------------------------------
  assertMsg(ext.FRAGMENT_SHADER_DERIVATIVE_HINT_OES === 0x8B8B,
    'ext.FRAGMENT_SHADER_DERIVATIVE_HINT_OES === 0x8B8B');

  // The constant is also exposed on the GL context itself (so JS doesn't
  // have to dereference `ext.` to call gl.hint).
  assertMsg(gl.FRAGMENT_SHADER_DERIVATIVE_HINT_OES === 0x8B8B,
    'gl.FRAGMENT_SHADER_DERIVATIVE_HINT_OES === 0x8B8B (proto constant)');
  assertMsg(gl.DONT_CARE === 0x1100, 'gl.DONT_CARE === 0x1100');
  assertMsg(gl.FASTEST === 0x1101, 'gl.FASTEST === 0x1101');
  assertMsg(gl.NICEST === 0x1102, 'gl.NICEST === 0x1102');

  // --- gl.hint() validation -------------------------------------------------
  // Default value per WebGL spec is DONT_CARE.
  var defaultHint = gl.getParameter(ext.FRAGMENT_SHADER_DERIVATIVE_HINT_OES);
  wtu.glErrorShouldBe(gl, gl.NO_ERROR,
    'getParameter(FRAGMENT_SHADER_DERIVATIVE_HINT_OES) succeeds with extension enabled');
  assertMsg(defaultHint === gl.DONT_CARE,
    'Default hint value is DONT_CARE (got 0x' + (defaultHint >>> 0).toString(16) + ')');

  // Round-trip all three valid hint modes.
  var modes = [
    { name: 'FASTEST', val: gl.FASTEST },
    { name: 'NICEST', val: gl.NICEST },
    { name: 'DONT_CARE', val: gl.DONT_CARE },
  ];
  var anyFailed = false;
  for (var i = 0; i < modes.length; i++) {
    gl.hint(ext.FRAGMENT_SHADER_DERIVATIVE_HINT_OES, modes[i].val);
    wtu.glErrorShouldBe(gl, gl.NO_ERROR,
      'gl.hint(FRAGMENT_SHADER_DERIVATIVE_HINT_OES, ' + modes[i].name + ') succeeds');
    var got = gl.getParameter(ext.FRAGMENT_SHADER_DERIVATIVE_HINT_OES);
    if (got !== modes[i].val) {
      testFailed('Round-trip hint mode ' + modes[i].name + ' failed: got 0x' +
        (got >>> 0).toString(16) + ' expected 0x' + (modes[i].val >>> 0).toString(16));
      anyFailed = true;
    }
  }
  if (!anyFailed) {
    testPassed('Round-trip of hint()/getParameter() for FASTEST, NICEST, DONT_CARE');
  }

  // Invalid mode → INVALID_ENUM. Reset state first by consuming any
  // leftover error.
  while (gl.getError() !== gl.NO_ERROR) { /* drain */ }
  gl.hint(ext.FRAGMENT_SHADER_DERIVATIVE_HINT_OES, 0x9999 /* not a valid mode */);
  wtu.glErrorShouldBe(gl, gl.INVALID_ENUM,
    'gl.hint with invalid mode raises INVALID_ENUM');

  // Invalid pname → INVALID_ENUM (verify by passing a non-hint pname).
  gl.hint(0x9999 /* not a valid hint pname */, gl.DONT_CARE);
  wtu.glErrorShouldBe(gl, gl.INVALID_ENUM,
    'gl.hint with unknown pname raises INVALID_ENUM');

  // After the failed hint(), the previously-set value should persist.
  // We last successfully set DONT_CARE above. (Note: any failed hint
  // call must not corrupt state per spec.)
  var afterErr = gl.getParameter(ext.FRAGMENT_SHADER_DERIVATIVE_HINT_OES);
  assertMsg(afterErr === gl.DONT_CARE,
    'Hint value preserved across failed hint() calls (got 0x' +
    (afterErr >>> 0).toString(16) + ')');

  // GENERATE_MIPMAP_HINT (the other valid pname) accepted too.
  while (gl.getError() !== gl.NO_ERROR) { /* drain */ }
  gl.hint(gl.GENERATE_MIPMAP_HINT, gl.NICEST);
  wtu.glErrorShouldBe(gl, gl.NO_ERROR,
    'gl.hint(GENERATE_MIPMAP_HINT, NICEST) succeeds');
  assertMsg(gl.getParameter(gl.GENERATE_MIPMAP_HINT) === gl.NICEST,
    'GENERATE_MIPMAP_HINT round-trip with NICEST');

  // --- Output test: dFdx/dFdy/fwidth on a real draw -------------------------
  // Renders a quad whose z varies linearly across the screen; fragment
  // shader emits (abs(dFdx(z))*40, abs(dFdy(z))*40, fwidth(z)*40, 1).
  // Expected pixel values are derived from the upstream test's math:
  //   canvas = 50x50
  //   dFdx = (tr-tl)/50, dFdy = (tl-bl)/50  (approximately)
  //   for "variation in x" (tl=tr=1, bl=br=0 in the upstream pattern
  //     — we use tl=tr=1, bl=br=0 directly via vertex z values):
  //   dFdx = 0, dFdy = 0.02 → expected RGB ≈ (0, 204, 204)
  //
  // Uses #pragma raw_passthrough so the custom shader actually executes
  // (see [[bridge-raw-shader-passthrough]]); without that, the bridge
  // swaps in its own hardcoded program and dFdx/dFdy never run.

  gl.viewport(0, 0, 50, 50);
  gl.hint(ext.FRAGMENT_SHADER_DERIVATIVE_HINT_OES, gl.NICEST);

  var program = wtu.setupProgram(gl,
    ['outputVertexShader', 'outputFragmentShader'],
    ['vPosition'], [0]);
  if (!program) {
    testFailed('Could not link output program (passthrough shaders)');
    finishTest();
    throw new Error('no program');
  }

  // Build a quad whose z varies in y (tl=tr=1, bl=br=0). z stored in
  // the position.z slot so the fragment shader picks it up via
  // `varying vec4 position`.
  var positions = new Float32Array([
    // x, y, z (top-left, top-right, bottom-left, then second tri)
     1.0,  1.0, 1.0,   // tr
    -1.0,  1.0, 1.0,   // tl
    -1.0, -1.0, 0.0,   // bl
     1.0,  1.0, 1.0,   // tr
    -1.0, -1.0, 0.0,   // bl
     1.0, -1.0, 0.0,   // br
  ]);
  var quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 0, 0);

  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.drawArrays(gl.TRIANGLES, 0, 6);
  wtu.glErrorShouldBe(gl, gl.NO_ERROR, 'drawArrays of passthrough quad');

  // The expected pixel output (NICEST hint, derivative of z over 50px).
  // The actual derivative implementation can be coarse or fine — both
  // are spec-permitted. We accept a wide error range to absorb that.
  var px = Math.floor(0.5 * 50);
  var py = Math.floor(0.5 * 50);
  var buf = new Uint8Array(4);
  gl.readPixels(px, py, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, buf);
  // Expected: dFdx(z) ≈ 0 in middle (tl==tr, bl==br) → R near 0.
  //           dFdy(z) ≈ 0.02 → G ≈ 204.
  //           fwidth(z) ≈ 0.02 → B ≈ 204.
  // Accept a generous range because Tegra's derivative impl varies and
  // the bridge's CPU-side perspective divide can shift z slightly.
  var dxOk = buf[0] < 30;
  var dyOk = Math.abs(buf[1] - 204) < 60;
  var fwOk = Math.abs(buf[2] - 204) < 60;
  var aOk = buf[3] === 255;
  if (dxOk && dyOk && fwOk && aOk) {
    testPassed('Output pixel ≈ (0, 204, 204, 255) for z-varies-in-y quad ' +
      '(got ' + buf[0] + ',' + buf[1] + ',' + buf[2] + ',' + buf[3] + ')');
  } else {
    testFailed('Output pixel mismatch: got ' + buf[0] + ',' + buf[1] + ',' +
      buf[2] + ',' + buf[3] + ' expected ~(0, 204, 204, 255). ' +
      'dxOk=' + dxOk + ' dyOk=' + dyOk + ' fwOk=' + fwOk + ' aOk=' + aOk);
  }

  // Verify a corner pixel too — derivatives should be constant across
  // the quad since z is a linear function of position.
  gl.readPixels(5, 5, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, buf);
  var dxOk2 = buf[0] < 30;
  var dyOk2 = Math.abs(buf[1] - 204) < 60;
  if (dxOk2 && dyOk2) {
    testPassed('Output pixel at (5,5) also shows the derivative pattern ' +
      '(got ' + buf[0] + ',' + buf[1] + ',' + buf[2] + ',' + buf[3] + ')');
  } else {
    testFailed('Output pixel at (5,5) doesnt match: got ' + buf[0] + ',' +
      buf[1] + ',' + buf[2] + ',' + buf[3]);
  }

  finishTest();

} catch (e) {
  testFailed('uncaught: ' + (e && e.message ? e.message : String(e)));
  finishTest();
}
</script>
</body>
</html>
