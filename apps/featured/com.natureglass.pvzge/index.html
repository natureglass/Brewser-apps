  <!-- 2026-06-07: FREEZE DIAGNOSTIC (installed FIRST so it catches even very
       early errors). inGameScene transition (post-PLAY) seizes the entire JS
       event loop — pipeline-diag's setInterval stops firing AND rAF stops.
       (a) heartbeat: 500ms setInterval that logs `[hb] N` — if heartbeat
           stops at some tick, that's the moment JS froze.
       (b) onerror + unhandledrejection: surface anything Cocos's per-frame
           update throws and swallows.
       (c) requestAnimationFrame wrapper: catch+log any uncaught throw inside
           an rAF callback (Cocos's main loop runs here). Re-throw so existing
           behaviour isn't masked. -->
  <script>
    (function () {
      if (globalThis.__pvzge_freezeDiagInstalled) return;
      globalThis.__pvzge_freezeDiagInstalled = true;
      var hbTick = 0;
      try {
        setInterval(function () {
          hbTick++;
          try { console.debug('[hb] ' + hbTick); } catch (e) {}
        }, 500);
      } catch (e0) {
        try { console.debug('[hb] setInterval install threw: ' + String(e0 && e0.message || e0).substring(0, 200)); } catch (e) {}
      }
      try {
        var prevOnError = globalThis.onerror;
        globalThis.onerror = function (msg, src, line, col, err) {
          try {
            var stk = err && err.stack ? String(err.stack).substring(0, 800) : '<no-stack>';
            console.debug('[onerror] msg=' + String(msg).substring(0, 200)
              + ' src=' + String(src).substring(0, 200)
              + ' line=' + line + ' col=' + col
              + ' stack=' + stk);
          } catch (e) {}
          if (typeof prevOnError === 'function') {
            try { return prevOnError.apply(this, arguments); } catch (e) {}
          }
          return false;
        };
      } catch (e1) {
        try { console.debug('[onerror] install threw: ' + String(e1 && e1.message || e1).substring(0, 200)); } catch (e) {}
      }
      try {
        globalThis.addEventListener && globalThis.addEventListener('unhandledrejection', function (ev) {
          try {
            var reason = ev && ev.reason;
            var msg = reason && reason.message ? reason.message : String(reason);
            var stk = reason && reason.stack ? String(reason.stack).substring(0, 800) : '<no-stack>';
            console.debug('[unhandledrejection] msg=' + String(msg).substring(0, 200) + ' stack=' + stk);
          } catch (e) {}
        });
      } catch (e2) {
        try { console.debug('[unhandledrejection] install threw: ' + String(e2 && e2.message || e2).substring(0, 200)); } catch (e) {}
      }
      try {
        if (typeof globalThis.requestAnimationFrame === 'function') {
          var origRAF = globalThis.requestAnimationFrame.bind(globalThis);
          var rafCount = 0, rafLastLog = 0;
          globalThis.requestAnimationFrame = function (cb) {
            return origRAF(function (ts) {
              rafCount++;
              // Log every 120 frames (~2s) so we have a steady raf-heartbeat
              if (rafCount - rafLastLog >= 120) {
                rafLastLog = rafCount;
                try { console.debug('[raf-wrap] count=' + rafCount); } catch (e) {}
              }
              try {
                return cb(ts);
              } catch (eRAF) {
                try {
                  var stk = eRAF && eRAF.stack ? String(eRAF.stack).substring(0, 800) : '<no-stack>';
                  console.debug('[raf-throw] count=' + rafCount
                    + ' msg=' + String(eRAF && eRAF.message || eRAF).substring(0, 200)
                    + ' stack=' + stk);
                } catch (e) {}
                throw eRAF; // re-throw so existing handlers still see it
              }
            });
          };
        }
      } catch (e3) {
        try { console.debug('[raf-wrap] install threw: ' + String(e3 && e3.message || e3).substring(0, 200)); } catch (e) {}
      }
    })();
  </script>

  <!-- Diagnostic flag — when set, the engine's webgl-shim wraps the native
       WebGL context with a logging Proxy that surfaces every property access
       and flags UNDEFINED accesses. Set BEFORE the page calls canvas.getContext(),
       which Cocos does during cc.game.init's render-system bootstrap. -->
  <!-- Engine GL Proxy disabled: the proxy's get trap always returns a fresh
       wrapper around target[prop], which causes our instance-side gl.clear
       writes to be silently reverted (the wrapper reads target.clear, not
       our patched value). Our instance hook captures all the data we need
       (bindFramebuffer/clear/clearColor/drawElements/copyBridgeToCanvas)
       and works correctly when patching the raw nxjs context directly. -->
  <script>globalThis.__brewserGLProxyDebug = false;</script>
  <script>globalThis.__brewserGLProxySampleEvery = 0;</script>

  <!-- Page-side WebGL2 prototype hooks. The engine proxy logs every call but
       prints only argument TYPES (number, object). For the gray-screen
       investigation we need actual VALUES — specifically whether
       `bindFramebuffer`'s framebuffer arg is null (the default = swapchain) or
       a custom FBO. Patch the prototype directly so any WebGL2RC instance
       picks the wrapper up; the engine proxy still wraps method dispatch on
       top but ultimately calls our wrapped prototype methods.

       Stats are accumulated and dumped periodically via the diag tick so we
       don't spam thousands of lines. The page logs:
         [glhook] tick N: bindFB null=X FBO=Y last={target,fbType}
                         clearColor last={r,g,b,a} count=N
                         clear mask=last currentFB=null|FBO count=N
                         draws null=X FBO=Y total=N
   -->
  <script>
    (function () {
      if (typeof WebGL2RenderingContext === 'undefined') return;
      if (globalThis.__pvzge_glhook_installed) return;
      globalThis.__pvzge_glhook_installed = true;
      var proto = WebGL2RenderingContext.prototype;
      var stats = {
        bindFB_null: 0,
        bindFB_FBO: 0,
        lastBindTarget: null,
        lastBindIsNull: null,
        currentFB_isNull: true, // OpenGL default state is FB 0 = null = swapchain
        clearColor_count: 0,
        lastClearColor: null,
        clear_count: 0,
        clear_at_null: 0,
        clear_at_FBO: 0,
        lastClearMask: null,
        draw_count: 0,
        draw_at_null: 0,
        draw_at_FBO: 0,
        viewport_count: 0,
        lastViewport: null,
      };
      globalThis.__pvzge_glstats = stats;

      var origBindFB = proto.bindFramebuffer;
      proto.bindFramebuffer = function (target, fb) {
        var isNull = fb === null || fb === undefined;
        stats.lastBindTarget = target;
        stats.lastBindIsNull = isNull;
        if (isNull) stats.bindFB_null++; else stats.bindFB_FBO++;
        // GL_FRAMEBUFFER=0x8D40, GL_DRAW_FRAMEBUFFER=0x8CA9, GL_READ_FRAMEBUFFER=0x8CA8.
        // The "active" FB for draw calls is the DRAW_FRAMEBUFFER. GL_FRAMEBUFFER
        // sets both DRAW and READ. So we update currentFB_isNull whenever target
        // is FRAMEBUFFER or DRAW_FRAMEBUFFER.
        if (target === 0x8D40 || target === 0x8CA9) {
          stats.currentFB_isNull = isNull;
        }
        return origBindFB.call(this, target, fb);
      };

      var origClearColor = proto.clearColor;
      proto.clearColor = function (r, g, b, a) {
        stats.clearColor_count++;
        stats.lastClearColor = [r, g, b, a];
        return origClearColor.call(this, r, g, b, a);
      };

      var origClear = proto.clear;
      proto.clear = function (mask) {
        stats.clear_count++;
        stats.lastClearMask = mask;
        if (stats.currentFB_isNull) stats.clear_at_null++;
        else stats.clear_at_FBO++;
        return origClear.call(this, mask);
      };

      var origDrawElements = proto.drawElements;
      proto.drawElements = function (mode, count, type, offset) {
        stats.draw_count++;
        if (stats.currentFB_isNull) stats.draw_at_null++;
        else stats.draw_at_FBO++;
        return origDrawElements.call(this, mode, count, type, offset);
      };

      var origDrawArrays = proto.drawArrays;
      proto.drawArrays = function (mode, first, count) {
        stats.draw_count++;
        if (stats.currentFB_isNull) stats.draw_at_null++;
        else stats.draw_at_FBO++;
        return origDrawArrays.call(this, mode, first, count);
      };

      var origViewport = proto.viewport;
      proto.viewport = function (x, y, w, h) {
        stats.viewport_count++;
        stats.lastViewport = [x, y, w, h];
        return origViewport.call(this, x, y, w, h);
      };

      // Periodic dump every 2s, separate from the cocos pipeline diag.
      setInterval(function () {
        console.debug('[glhook] binds null=' + stats.bindFB_null + ' FBO=' + stats.bindFB_FBO + ' lastTarget=' + stats.lastBindTarget + ' lastIsNull=' + stats.lastBindIsNull + ' curFB=' + (stats.currentFB_isNull ? 'NULL' : 'FBO'));
        console.debug('[glhook] clear count=' + stats.clear_count + ' atNull=' + stats.clear_at_null + ' atFBO=' + stats.clear_at_FBO + ' lastMask=' + stats.lastClearMask + ' lastColor=' + JSON.stringify(stats.lastClearColor));
        console.debug('[glhook] draws total=' + stats.draw_count + ' atNull=' + stats.draw_at_null + ' atFBO=' + stats.draw_at_FBO + ' viewport=' + JSON.stringify(stats.lastViewport));
      }, 2000);
    })();
  </script>

  <!-- Diagnostic: catch silent JS exceptions (unhandled `Error` thrown
       from Cocos's bootstrap, or rejected promises). Without these we
       can't see why preload would stall in a gray-screen state. -->
  <script>
    (function () {
      try {
        globalThis.addEventListener('error', function (e) {
          var msg = (e && e.message) || (e && e.error && e.error.message) || String(e);
          var src = (e && e.filename) || '?';
          var line = (e && e.lineno) || 0;
          console.debug('[err]', msg, 'at', src + ':' + line);
        });
        globalThis.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          var msg = (r && (r.message || r.stack)) || String(r);
          console.debug('[unhandled]', msg);
        });
      } catch (_) {}
      var prev = globalThis.onerror;
      globalThis.onerror = function (msg, src, line, col, err) {
        console.debug('[onerror]', String(msg), (src || '?') + ':' + (line || 0));
        if (typeof prev === 'function') { try { return prev.apply(this, arguments); } catch (_) {} }
        return false;
      };
    })();
  </script>

  <!-- Diagnostic: count requestAnimationFrame ticks. Citron reports 60fps
       at its display layer regardless of whether Cocos's render loop is
       alive, so we can't infer Cocos's liveness from emulator FPS. This
       hook logs every 60th rAF callback so we can directly see whether
       Cocos is actually pumping frames. -->
  <script>
    (function () {
      if (typeof globalThis.requestAnimationFrame !== 'function') return;
      if (globalThis.__pvzge_raf_counter_installed) return;
      globalThis.__pvzge_raf_counter_installed = true;
      var frameCount = 0;
      var origRAF = globalThis.requestAnimationFrame;
      function tick(t) {
        frameCount++;
        if (frameCount === 1 || frameCount === 5 || frameCount % 60 === 0) {
          console.debug('[raf]', 'frame', frameCount);
        }
        origRAF.call(globalThis, tick);
      }
      origRAF.call(globalThis, tick);
    })();
  </script>

  <!-- Diagnostic: log every fetch() URL + outcome. SystemJS now uses
       fetch to load the importmap.json (after the script-tag enumeration
       fix), and Cocos's asset manager uses fetch for binary asset
       bundles. If any URL fails or hangs we'll see it here. Dedups per
       URL/outcome to avoid flooding. -->
  <script>
    (function () {
      if (typeof globalThis.fetch !== 'function') return;
      if (globalThis.__pvzge_fetch_wrapped) return;
      globalThis.__pvzge_fetch_wrapped = true;
      var origFetch = globalThis.fetch;
      var seen = Object.create(null);
      function shortUrl(u) {
        var s = String(u);
        if (s.length > 120) s = s.substring(0, 60) + '...' + s.substring(s.length - 50);
        return s;
      }
      function once(key, fn) { if (!seen[key]) { seen[key] = true; fn(); } }
      globalThis.fetch = function (input, init) {
        var url = (input && input.url) || String(input);
        var su = shortUrl(url);
        once('s:' + su, function () { console.debug('[fetch] start', su); });
        // Stub external pvzge.com endpoints — Switch can't reach them. The
        // game expects gameinfo.json to have an `InsideVersion` field; without
        // it, compareVersions() throws TypeError inside an internal catch.
        // Return InsideVersion matching the game's own version so the
        // update-check is a no-op.
        if (/^https?:\/\/(www\.)?pvzge\.com\//i.test(url)) {
          once('stub:' + su, function () { console.debug('[fetch] STUB pvzge.com', su); });
          var body = JSON.stringify({ InsideVersion: '0.0.0' });
          var res = new Response(body, { status: 200, statusText: 'OK', headers: { 'Content-Type': 'application/json' } });
          return Promise.resolve(res);
        }
        return origFetch.call(this, input, init).then(function (r) {
          once('r:' + r.status + ':' + su, function () {
            console.debug('[fetch]', r.ok ? 'ok' : 'fail', r.status, su);
          });
          return r;
        }, function (err) {
          var msg = (err && (err.message || err.name)) || String(err);
          once('e:' + msg + ':' + su, function () {
            console.debug('[fetch] err', su, msg);
          });
          throw err;
        });
      };
    })();
  </script>

  <!-- Diagnostic: wrap System.import so we can intercept the 'cc'
       namespace as application.js receives it via
       `topLevelImport('cc').then(engine => application.init(engine))`.
       The previous log showed `loadBundle` wrap fired but `game.init`
       wrap didn't — which means application.js's `cc.game` IS NOT the
       same object as `globalThis.cc.game`. They share `assetManager`
       (same singleton) but `game` is bound differently. Patching the
       namespace object directly catches the path application.js
       actually uses. -->
  <script>
    (function () {
      if (globalThis.__pvzge_sysimport_wrapped) return;
      function waitForSystem() {
        if (typeof System === 'undefined' || typeof System.import !== 'function') {
          setTimeout(waitForSystem, 5);
          return;
        }
        if (globalThis.__pvzge_sysimport_wrapped) return;
        globalThis.__pvzge_sysimport_wrapped = true;
        var origImport = System.import.bind(System);
        System.import = function (id, parentUrl) {
          var p = origImport(id, parentUrl);
          if (id === 'cc') {
            p.then(function (ns) {
              console.debug('[sysjs] cc namespace resolved, keys=' +
                Object.keys(ns || {}).slice(0, 15).join(','));
              if (!ns || ns.__pvzge_ns_patched) return;
              ns.__pvzge_ns_patched = true;
              try {
                console.debug('[cc-ns] identity check: ns.game===globalThis.cc.game?',
                  ns.game === (globalThis.cc && globalThis.cc.game));
                console.debug('[cc-ns] identity check: ns.assetManager===globalThis.cc.assetManager?',
                  ns.assetManager === (globalThis.cc && globalThis.cc.assetManager));
              } catch (e) {}
              // Wrap game.init / game.run on the actual namespace object
              // that application.js uses. The wrapAsyncMethod helper is
              // hoisted later in this file; defer slightly so it exists.
              setTimeout(function () {
                if (!globalThis.__pvzge_ns_wrap_methods) return;
                globalThis.__pvzge_ns_wrap_methods(ns);
              }, 0);
            }, function (err) {
              console.debug('[sysjs] cc namespace REJECTED', String(err && err.message || err));
            });
          }
          return p;
        };
      }
      waitForSystem();
    })();
  </script>

  <!-- Diagnostic: hook Cocos's `cc` global as soon as cc.js assigns it.
       Wraps cc.assetManager.loadBundle / cc.game.init / cc.game.run /
       cc.director.runScene so we can see exactly which step in the
       boot chain settles vs hangs. The page log so far confirms Cocos
       loads up through `assets/internal/config.json` then never fires
       any further asset fetch — this hook will name the specific
       cc.* method whose promise never resolves. -->

    (function () {
      if (globalThis.__pvzge_cc_hook_installed) return;
      globalThis.__pvzge_cc_hook_installed = true;
      var realCC;
      var wrapped = false;
      function safeMsg(e) {
        return (e && (e.message || e.stack)) || String(e);
      }

        if (!obj || typeof obj[name] !== 'function') return false;
        if (obj[name].__pvzge_wrapped) return false;
        var orig = obj[name];
        var wrapper = function () {
          console.debug('[cc]', label, 'begin', arguments.length === 0 ? '' : 'arg0=' + describeArg(arguments[0]));
          var p;
          try { p = orig.apply(this, arguments); }
          catch (e) {
            console.debug('[cc]', label, 'THREW SYNC', safeMsg(e));
            throw e;
          }
          if (p && typeof p.then === 'function') {
            p.then(function () { console.debug('[cc]', label, 'resolved'); },
                   function (err) { console.debug('[cc]', label, 'REJECTED', safeMsg(err)); });
          } else {
            console.debug('[cc]', label, 'returned (not a promise)');
          }
          return p;
        };
        wrapper.__pvzge_wrapped = true;
        obj[name] = wrapper;
        return true;
      }
      function describeArg(a) {
        if (a == null) return String(a);
        if (typeof a === 'string') return a;
        if (typeof a === 'object') {
          // Surface the most useful key for asset-pipeline diagnostics.
          if (a.url) return 'url=' + String(a.url).slice(0, 120);
          if (a.uuid) return 'uuid=' + a.uuid;
          if (a.path) return 'path=' + a.path;
          if (a.bundle) return 'bundle=' + a.bundle;
          if (Array.isArray(a)) return 'array[' + a.length + ']' + (a[0] ? ' first=' + describeArg(a[0]) : '');
          // Fallback: first few keys to give us a shape hint.
          var ks = Object.keys(a).slice(0, 5);
          return '{' + ks.join(',') + '}';
        }
        return typeof a;

      // path/scene/dir requests (see Hf.UUID branch in _T). When the request
      // shape is {path:'X', bundle:''}, the path branch silently skips
      // resolution and the request fails with 16329 "Can not parse this
      // input". Walk assetManager.bundles for any bundle whose config can
      // resolve the path/scene/dir and patch the request in place.

        var ccRef = globalThis.cc;
        if (!ccRef || !ccRef.assetManager || !ccRef.assetManager.bundles) return;
        var bundles = ccRef.assetManager.bundles;
        var iter = bundles.find ? bundles.find.bind(bundles) : null;
        if (!iter) return;
        var found = null;
        if (typeof req.path === 'string') {
          found = iter(function (b) {
            return !!(b && b.config && typeof b.config.getInfoWithPath === 'function' && b.config.getInfoWithPath(req.path, req.type));
          });
        } else if (typeof req.dir === 'string') {
          // getDirWithPath populates an output array; non-empty result means hit.
          var probe = [];
          found = iter(function (b) {
            probe.length = 0;
            if (!b || !b.config || typeof b.config.getDirWithPath !== 'function') return false;
            b.config.getDirWithPath(req.dir, req.type, probe);
            return probe.length > 0;
          });
        } else if (typeof req.scene === 'string') {
          found = iter(function (b) {
            return !!(b && b.config && typeof b.config.getSceneInfo === 'function' && b.config.getSceneInfo(req.scene));
          });
        }
        if (found && found.name) {
          req.bundle = found.name;

      // and options has __requestType__. Walks bundles to find one whose
      // config can resolve specifier under the given request type, then
      // patches options.bundle in place.

        if (opts.bundle) return;
        var ccRef = globalThis.cc;
        if (!ccRef || !ccRef.assetManager || !ccRef.assetManager.bundles) return;
        var bundles = ccRef.assetManager.bundles;
        var iter = bundles.find ? bundles.find.bind(bundles) : null;
        if (!iter) return;

          });

          });

        }

        if (!obj || typeof obj[name] !== 'function') return false;

          // tutorial1→egypt1 substitution proved the freeze is structural
          // (egypt1 also freezes at same point). Reverting per user request
          // so we test tutorial1 path normally. Re-enable by uncommenting
          // if isolation testing is needed again.

          //       console.debug('[cc] LEVEL-SUB: rewriting "levels/tutorial1" -> "levels/egypt1"');
          //       args[0] = 'levels/egypt1';
          //     } else if (args[0] && typeof args[0] === 'object' && args[0].path === 'levels/tutorial1') {
          //       console.debug('[cc] LEVEL-SUB: rewriting path "levels/tutorial1" -> "levels/egypt1"');
          //       args[0].path = 'levels/egypt1';

                  } catch (e) { console.debug('[loadingtip-snap] err=' + (e && e.message)); }
                }
                Promise.resolve().then(function () { snap('t=microtask'); });
                setTimeout(function () { snap('t=500ms'); }, 500);
                setTimeout(function () { snap('t=2000ms'); }, 2000);
                setTimeout(function () { snap('t=5000ms'); }, 5000);
              }
              return r;
            },
            configurable: true,
          });
          console.debug('[label-probe] LoadingTip wrap installed');
        } catch (e) {
          console.debug('[label-probe] defineProperty threw: ' + String(e && e.message));
        }
        return true;
      }

      // ── PROBE B: periodic scene snapshot ──
      var snapTick = 0;
      function dumpSceneSnap() {
        snapTick++;
        try {
          var cc = globalThis.cc;
          if (!cc || !cc.director) {
            console.debug('[scene-snap] tick=' + snapTick + ' no-cc');
            return;
          }
          var sc = cc.director.scene;
          if (!sc) {
            console.debug('[scene-snap] tick=' + snapTick + ' no-scene lastCall='
              + (globalThis.__pvzge_lastWrappedCall || '?'));
            return;
          }
          var sceneName = '?';
          try { sceneName = sc.name || '?'; } catch (e) {}
          var topChildren = -1;
          try { topChildren = sc.children ? sc.children.length : -1; } catch (e) {}
          // Walk to depth 4, count nodes by kind hint
          var counts = { total: 0, active: 0, zombie: 0, plant: 0, projectile: 0, label: 0 };
          var samplePositions = [];
          function walk(node, depth) {
            if (!node || depth > 6) return;
            counts.total++;
            try { if (node.active !== false) counts.active++; } catch (e) {}
            var nm = ''; try { nm = node.name || ''; } catch (e) {}
            if (/zombie/i.test(nm)) {
              counts.zombie++;
              if (samplePositions.length < 3) {
                try {
                  var p = node.position || node._lpos || {};
                  samplePositions.push('Z:' + nm + '@(' + (p.x|0) + ',' + (p.y|0) + ')');
                } catch (e) {}
              }
            } else if (/plant|peashooter|sunflower/i.test(nm)) {
              counts.plant++;
            } else if (/projectile|pea|sun/i.test(nm)) {
              counts.projectile++;
            } else if (/label|text|tip/i.test(nm)) {
              counts.label++;
            }
            try {
              if (node.children && node.children.length) {
                for (var i = 0; i < node.children.length && i < 40; i++) {
                  walk(node.children[i], depth + 1);
                }
              }
            } catch (e) {}
          }
          walk(sc, 0);
          console.debug('[scene-snap] tick=' + snapTick + ' scene=' + sceneName
            + ' top=' + topChildren
            + ' nodes=' + counts.total + '/' + counts.active
            + ' z=' + counts.zombie + ' p=' + counts.plant + ' pr=' + counts.projectile
            + ' lab=' + counts.label
            + ' lastCall=' + (globalThis.__pvzge_lastWrappedCall || '?')
            + (samplePositions.length ? ' samples=[' + samplePositions.join('|') + ']' : ''));
        } catch (e) {
          console.debug('[scene-snap] tick=' + snapTick + ' err=' + String(e && e.message));
        }
      }

      // Poll for cc to install Label wrap, and tick scene-snap.
      var pollCount = 0;
      var labelDone = false;
      var poll = setInterval(function () {
        pollCount++;
        if (!labelDone) {
          try { labelDone = tryWrapLabelString(globalThis.cc); } catch (e) {}
        }
        if (pollCount > 800) clearInterval(poll);
      }, 50);
      setInterval(dumpSceneSnap, 3000);
      console.debug('[round36-probes] installed');
    })();
  </script>

  <!-- Diagnostic: log every `new Image()` and its `src = url` assignment,
       plus the onload/onerror outcome. Cocos's texture loader uses this
       pipeline; if any URL fails to load, the asset preloader hangs and
       Cocos never instantiates the scene (gray-screen state). Each URL
       is logged at most once per outcome to avoid flooding. Remove once
       gray-screen blocker is identified. -->
  <script>
    (function () {
      if (typeof globalThis.Image !== 'function') return;
      if (globalThis.__pvzge_img_wrapped) return;
      globalThis.__pvzge_img_wrapped = true;
      var origImage = globalThis.Image;
      var seenStart = Object.create(null);
      var seenOutcome = Object.create(null);
      function shortUrl(u) {
        var s = String(u);
        if (s.length > 120) s = s.substring(0, 60) + '...' + s.substring(s.length - 50);
        return s;
      }
      function logStart(url) {
        if (seenStart[url]) return;
        seenStart[url] = true;
        console.debug('[img] start', shortUrl(url));
      }
      function logOutcome(url, outcome) {
        var key = outcome + ':' + url;
        if (seenOutcome[key]) return;
        seenOutcome[key] = true;
        console.debug('[img]', outcome, shortUrl(url));
      }
      // Translate a brewser:// URL to a blob: URL that nxjs's internal
      // fetch (used by Image's native src setter at nxjs:src/image.ts:94)
      // can consume. nxjs's `fetchers` Map (nxjs:src/fetch/fetch.ts:447)
      // registers http/https/blob/data/file/sdmc/romfs but NOT brewser:.
      // Page-script `fetch` (swb override) HAS brewser:// support, so we
      // pipe it through that path, wrap the body as a Blob, mint a blob:
      // URL via URL.createObjectURL, and hand THAT to the original setter.
      function translateBrewserSrc(img, url, applySrc) {
        fetch(url).then(function (r) {
          if (!r.ok) throw new Error('brewser fetch ' + url + ' -> ' + r.status);
          return r.blob();
        }).then(function (blob) {
          var blobUrl = URL.createObjectURL(blob);
          applySrc(blobUrl);
        }).catch(function (err) {
          console.debug('[img] brewser translate failed', url, String(err && err.message || err));
          // Fire error event so the caller's onerror runs.
          try { img.dispatchEvent(new Event('error')); } catch (_) {}
        });
      }
      function wrapInstance(img) {
        var currentSrc = '';
        // Wrap src property on the instance so we capture the URL at assign
        // time even if the prototype getter/setter behaves unusually.
        var protoDesc = Object.getOwnPropertyDescriptor(origImage.prototype, 'src')
          || Object.getOwnPropertyDescriptor(Object.getPrototypeOf(img) || {}, 'src');
        function applyOriginalSrc(self, v) {
          if (protoDesc && protoDesc.set) protoDesc.set.call(self, v);
          else self.setAttribute && self.setAttribute('src', v);
        }
        try {
          Object.defineProperty(img, 'src', {
            configurable: true,
            enumerable: true,
            get: function () {
              return protoDesc && protoDesc.get ? protoDesc.get.call(this) : currentSrc;
            },
            set: function (v) {
              currentSrc = String(v);
              logStart(currentSrc);
              if (currentSrc.indexOf('brewser://') === 0) {
                var self = this;
                translateBrewserSrc(self, currentSrc, function (blobUrl) {
                  applyOriginalSrc(self, blobUrl);
                });
                return;
              }
              applyOriginalSrc(this, v);
            },
          });
        } catch (e) { /* property non-configurable — setAttribute hook below covers it */ }
        // Always also wrap setAttribute — some loaders use img.setAttribute('src', url)
        // instead of the property setter. The seenStart map dedups across paths.
        var origSetAttr = img.setAttribute && img.setAttribute.bind(img);
        if (origSetAttr) {
          img.setAttribute = function (name, value) {
            if (name === 'src') {
              var sv = String(value);
              currentSrc = sv;
              logStart(sv);
              if (sv.indexOf('brewser://') === 0) {
                var self = this;
                translateBrewserSrc(self, sv, function (blobUrl) {
                  origSetAttr.call(self, 'src', blobUrl);
                });
                return;
              }
            }
            return origSetAttr(name, value);
          };
        }
        img.addEventListener('load', function () {
          logOutcome(currentSrc, 'load');
          // 2026-06-07 texture-upload investigation: "load fired" does
          // not prove pixels decoded. Cocos's bridge readback at fbo=3
          // shows uniform cyan (Cocos's #44d7b6 placeholder) for the
          // splash sprite, suggesting that even though Image.src setter
          // accepts the blob: URL and the load event fires, the
          // underlying decoder returned 0 dimensions / no pixel data —
          // then `gl.texImage2D(img)` uploads zero bytes and the sprite
          // shader samples a default-placeholder. Log naturalWidth /
          // naturalHeight to spot this immediately.
          try {
            var nw = this.naturalWidth;
            var nh = this.naturalHeight;
            console.debug('[img] dims', shortUrl(currentSrc),
              (nw|0) + 'x' + (nh|0),
              'complete=' + (this.complete === true));
          } catch (_) {}
        });
        img.addEventListener('error', function () { logOutcome(currentSrc, 'error'); });
        return img;
      }
      function TrackedImage(w, h) {
        var inst = arguments.length >= 2
          ? new origImage(w, h)
          : arguments.length >= 1
            ? new origImage(w)
            : new origImage();
        return wrapInstance(inst);
      }
      TrackedImage.prototype = origImage.prototype;
      Object.setPrototypeOf(TrackedImage, origImage);
      globalThis.Image = TrackedImage;
    })();
  </script>

</head>

<body>
  <div id="GameDiv" cc_exact_fit_screen="true">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99" data-dbltap-action="fullscreen-canvas" data-fullscreen-live></canvas>
    </div>
  </div>

  <!-- Polyfills bundle. -->
  <script src="src/polyfills.bundle.js" charset="utf-8"></script>

  <!-- Transitional shim: createImageBitmap on an Image-like source with a URL
       string `src`. Engine's createImageBitmap now natively handles canvas
       sources (anything with a `convertToBlob()` method) but does NOT
       fetch-and-decode based on a `src` URL. Remove this entirely once the
       engine grows that capability. -->
  <script>
    (function () {
      if (typeof globalThis.createImageBitmap !== 'function') return;
      if (globalThis.__pvzge_cib_wrapped) return;
      globalThis.__pvzge_cib_wrapped = true;
      var origCIB = globalThis.createImageBitmap;
      globalThis.createImageBitmap = function (source) {
        var extra = Array.prototype.slice.call(arguments, 1);
        if (source && typeof source === 'object' &&
            typeof source.convertToBlob !== 'function' &&
            typeof source.src === 'string' && source.src.length > 0) {
          return fetch(source.src)
            .then(function (r) {
              if (!r.ok) throw new Error('createImageBitmap fetch ' + source.src + ' -> ' + r.status);
              return r.blob();
            })
            .then(function (blob) { return origCIB.apply(null, [blob].concat(extra)); });
        }
        return origCIB.apply(null, [source].concat(extra));
      };
    })();
  </script>

  <!-- SystemJS support. -->
  <script src="src/system.bundle.js" charset="utf-8"></script>

  <!-- SystemJS import map (upstream-shipped form). Engine now exposes
       script tags via `document.querySelectorAll('script')` so SystemJS's
       `prepareImport` finds this tag, fetches the JSON, and registers
       the map natively. -->
  <script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"></script>

  <!-- Transitional shim: SystemJS's default instantiate uses <script src=...>
       tag injection at runtime, which this engine does not support. Replace
       with fetch + indirect eval. Remove once engine supports either runtime
       <script> injection or SystemJS picks a fetch-based path natively. -->
  <script>
    (function () {
      if (typeof System === 'undefined' || typeof System.instantiate !== 'function') return;
      System.instantiate = function (url, parentUrl) {
        // SystemJS's named-register extension stores System.register("name", ...)
        // entries in System.registerRegistry. Its prototype's instantiate consults
        // that registry before fetching, but THIS override (set as an own property)
        // shadows it. Re-implement the named-register check here, then fall back
        // to fetch+eval for unregistered URLs (which the engine can't load via
        // <script src> injection).
        //
        // URL normalization: SystemJS's URL resolver collapses `chunks:///` to
        // `chunks://` (two slashes) during import resolution, but the main
        // bundle registers entries under the three-slash form. Try both.
        function lookup(u) {
          if (System.registerRegistry && (u in System.registerRegistry)) {
            return System.registerRegistry[u];  // may be null if already consumed
          }
          return undefined;
        }
        var candidates = [url];
        if (url.indexOf('chunks://') === 0 && url.indexOf('chunks:///') !== 0) {
          candidates.push('chunks:///' + url.substring('chunks://'.length));
        } else if (url.indexOf('chunks:///') === 0) {
          candidates.push('chunks://' + url.substring('chunks:///'.length));
        }
        for (var ci = 0; ci < candidates.length; ci++) {
          var key = candidates[ci];
          var entry = lookup(key);
          if (entry !== undefined) {
            // Hit. If null, the entry was already consumed by a prior instantiate;
            // SystemJS's import cache should have returned it before reaching us,
            // so this branch is unexpected — return null to let SystemJS handle it.
            if (entry !== null) System.registerRegistry[key] = null;
            return Promise.resolve(entry);
          }
        }
        return fetch(url).then(function (r) {
          if (!r.ok) throw new Error('fetch ' + url + ' returned ' + r.status);
          return r.text();
        }).then(function (src) {
          (0, eval)(src + '\n//# sourceURL=' + url);
          return System.getRegister ? System.getRegister() : null;
        });
      };
    })();
  </script>

  <script src="tmpPatch.js"></script>

  <script>
    console.debug('[sysjs] System.import begin');
    System.import('./index.js').then(function (mod) {
      console.debug('[sysjs] System.import resolved');
    }).catch(function (err) {
      console.debug('[sysjs] System.import REJECTED', (err && (err.message || err.stack)) || String(err));
      console.error(err);
    });
  </script>
