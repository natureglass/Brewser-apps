<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modern WebGL2 Audio Player</title>
  <style>
    :root {
      --bg: #090b14;
      --panel: rgba(16, 20, 34, 0.78);
      --text: #f8fbff;
      --muted: #95a3b8;
      --line: rgba(255,255,255,0.12);
      --accent: #7c5cff;
      --accent-2: #20e3b2;
      --accent-3: #ff4ecd;
      --accent-4: #ffd166;
      --shadow: none;
      --radius-xl: 28px;
      --visualizer-height: 70%;
      --controls-height: 30%;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      height: 100vh;
      width: 100vw;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      grid-template-rows: var(--visualizer-height) var(--controls-height);
      gap: 16px;
      padding: 16px 16px 16px 16px;
    }

    .visualizer-card,
    .controls-card,
    .library-card {
      position: relative;
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
    }

    .visualizer-card {
      grid-column: 1;
      grid-row: 1;
      border-radius: var(--radius-xl);
    }

    .controls-card {
      grid-column: 1;
      grid-row: 2;
      border-radius: var(--radius-xl);
      display: grid;
      grid-template-columns: minmax(360px, 1fr) minmax(190px, 0.35fr);
      align-items: center;
      gap: 18px;
      padding: 18px;
    }

    .library-card {
      grid-column: 2;
      grid-row: 1 / 3;
      border-radius: var(--radius-xl);
      display: flex;
      flex-direction: column;
    }

    .visualizer-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 18%, transparent 76%);
      opacity: 0.6;
      pointer-events: none;
    }

    #visualizer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .visualizer-head {
      position: absolute;
      top: 22px;
      left: 24px;
      right: 24px;
      z-index: 3;
      display: flex;
      justify-content: flex-end;
      pointer-events: none;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 148px;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(7, 10, 18, 0.46);
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #e0353b;
    }

    .status-pill.is-playing .dot {
      background: #16a34a;
    }

    .transport {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .timeline-row,
    .aux-controls,
    .main-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .main-controls {
      justify-content: center;
    }

    .time {
      color: var(--muted);
      min-width: 48px;
      font-variant-numeric: tabular-nums;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .time:last-child { text-align: right; }

    input[type="range"] {
      --fill: 0%;
      width: 100%;
      cursor: pointer;
    }

    .icon-btn,
    .play-btn {
      border: 0;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn {
      min-width: 56px;
      height: 44px;
      padding: 0 14px;
      border-radius: 15px;
      background: rgba(255,255,255,0.075);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      /* Keep the label at its content width on the narrow (1280px) screen.
         Without this the "Vol" button shrinks inside the tight right column
         and clips to "Vo" (the engine has no flex min-content floor); the
         volume slider beside it (flex-shrink:1) absorbs the space instead. */
      flex-shrink: 0;
    }

    /* Playback state uses <img> assets. The live-DOM painter decodes
       <img> raster sources but does NOT support CSS background-image
       url(), so the art must be real elements. Both icons are preloaded;
       the `.playing` class toggles which one shows via display, so a
       play/pause tap repaints only this button's region (the targeted
       partial-repaint path) instead of rebuilding the whole page. */
    .play-btn {
      width: clamp(64px, 6.6vw, 82px);
      height: clamp(64px, 6.6vw, 82px);
      padding: 0;
      border-radius: 50%;
      background: transparent;
      overflow: hidden;
    }

    .play-btn .ctrl-icon {
      display: block;
      width: 100%;
      height: 100%;
    }

    .play-btn .icon-pause { display: none; }
    .play-btn.playing .icon-play { display: none; }
    .play-btn.playing .icon-pause { display: block; }

    /* PNG icons for the prev/next, volume, and visualizer-arrow buttons —
       same approach as the play/pause button: real <img> elements (the
       live-DOM painter decodes <img> but not CSS background-image). */
    .btn-icon {
      display: block;
      width: 24px;
      height: 24px;
    }

    /* Mute button swaps between the on/off volume icons via the `.is-active`
       class (set by updateMuteButton when muted), like the play/pause swap. */
    .icon-vol-off { display: none; }
    .icon-btn.is-active .icon-vol-on { display: none; }
    .icon-btn.is-active .icon-vol-off { display: block; }

    .play-btn:focus-visible {
      outline: 2px solid var(--accent-2);
      outline-offset: 4px;
    }

    .icon-btn.is-active {
      background: rgba(124, 92, 255, 0.24);
      border-color: rgba(124, 92, 255, 0.55);
      color: #ded8ff;
    }

    .right-controls {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
    }

    /* Keep the two stacked rows at their content height. The live-DOM
       column-flex has no `min-height: auto` floor, so without this the
       aux row + visualizer selector collapse toward zero height and
       overlap each other. */
    .aux-controls,
    .viz-selector {
      flex-shrink: 0;
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      width: 100%;
    }

    #volume {
      width: min(150px, 100%);
      --fill: 86%;
    }

    .viz-selector {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 42px;
      align-items: center;
      gap: 8px;
      width: min(230px, 100%);
      padding: 8px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.055);
    }

    .viz-arrow {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 13px;
      background: rgba(255,255,255,0.075);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      line-height: 1;
    }

    .viz-arrow:hover {
      border-color: rgba(32, 227, 178, 0.38);
      background: rgba(32, 227, 178, 0.10);
    }

    .viz-name-wrap {
      min-width: 0;
      text-align: center;
      line-height: 1.05;
    }

    .viz-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.63rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    #vizStyleName {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 0.9rem;
      letter-spacing: -0.02em;
    }

    .library-head {
      padding: 22px 22px 14px;
      border-bottom: 1px solid var(--line);
    }

    .library-head h2 {
      margin: 0 0 6px;
      font-size: 1.28rem;
      letter-spacing: -0.03em;
    }

    .library-head p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .library-list {
      padding: 12px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.24) transparent;
    }

    .library-track {
      position: relative;
      text-align: left;
      width: 100%;
      flex-shrink: 0;
      cursor: pointer;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      background: rgba(255,255,255,0.055);
      padding: 14px 14px 14px 54px;
    }

    .library-track.is-active {
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.30), rgba(32, 227, 178, 0.13));
      border-color: rgba(124, 92, 255, 0.55);
    }

    .library-track .num {
      position: absolute;
      left: 14px;
      top: 16px;
      width: 28px;
      height: 28px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.09);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .library-track strong {
      display: block;
      font-size: 0.98rem;
      line-height: 1.1;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .library-track span:not(.num) {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 22px;
      z-index: 6;
      max-width: min(720px, calc(100% - 40px));
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(8, 11, 20, 0.84);
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.42;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%);
    }

    .sr-only {
      display: none;
    }

    @media (max-width: 1080px) {
      html, body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(320px, 58vh) minmax(230px, 26vh) minmax(180px, 16vh);
        overflow: auto;
      }
      .visualizer-card { grid-column: 1; grid-row: 1; }
      .controls-card {
        grid-column: 1;
        grid-row: 2;
        grid-template-columns: 1fr;
        align-items: start;
        overflow: auto;
      }
      .library-card { grid-column: 1; grid-row: 3; min-height: 220px; }
      .library-list { flex-direction: row; overflow-x: auto; }
      .library-track { min-width: 260px; }
      .right-controls { flex-direction: row; align-items: center; }
      .viz-selector { width: min(280px, 100%); }
    }

    @media (max-width: 640px) {
      .app { padding: 10px; gap: 10px; }
      .visualizer-head { top: 16px; left: 16px; right: 16px; }
      .main-controls { gap: 8px; }
      .icon-btn { min-width: 40px; height: 40px; padding: 0 10px; }
      .aux-controls { flex-wrap: wrap; }
      .right-controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Modern WebGL2 audio player">
    <section class="visualizer-card" aria-label="Audio waveform visualizer">
      <canvas id="visualizer" data-dbltap-action="fullscreen-canvas" data-fullscreen-live></canvas>
      <div class="visualizer-head">
        <div id="statusPill" class="status-pill" aria-live="polite">
          <span class="dot" aria-hidden="true"></span>
          <span id="statusText">Ready</span>
        </div>
      </div>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </section>

    <section class="controls-card" aria-label="Playback controls">
      <div class="transport">
        <div class="timeline-row">
          <span id="currentTime" class="time">0:00</span>
          <label class="sr-only" for="seek">Seek</label>
          <input id="seek" type="range" min="0" max="1000" value="0" step="1" />
          <span id="duration" class="time">0:00</span>
        </div>

        <div class="main-controls" aria-label="Main playback buttons">
          <button id="shuffleBtn" class="icon-btn" type="button" title="Shuffle" aria-label="Shuffle">Shuffle</button>
          <button id="prevBtn" class="icon-btn" type="button" title="Previous" aria-label="Previous track">
            <img class="btn-icon" src="./assets/prev-button.png" alt="Previous track" />
          </button>
          <button id="playBtn" class="play-btn" type="button" title="Play" aria-label="Play">
            <img class="ctrl-icon icon-play" alt="Play" src="./assets/play-button.png" />
            <img class="ctrl-icon icon-pause" alt="Pause" src="./assets/pause-button.png" />
          </button>
          <button id="nextBtn" class="icon-btn" type="button" title="Next" aria-label="Next track">
            <img class="btn-icon" src="./assets/next-button.png" alt="Next track" />
          </button>
          <button id="repeatBtn" class="icon-btn" type="button" title="Repeat: off" aria-label="Repeat mode">Repeat</button>
        </div>
      </div>

      <div class="right-controls">
        <div class="aux-controls">
          <button id="muteBtn" class="icon-btn" type="button" title="Mute" aria-label="Mute">
            <img class="btn-icon icon-vol-on" src="./assets/on-volume.png" alt="Mute" />
            <img class="btn-icon icon-vol-off" src="./assets/off-volume.png" alt="Unmute" />
          </button>
          <div class="volume-wrap">
            <label class="sr-only" for="volume">Volume</label>
            <input id="volume" type="range" min="0" max="1" value="0.86" step="0.01" />
          </div>
        </div>
        <div class="viz-selector" role="group" aria-label="Visualizer style selector">
          <button id="vizPrevBtn" class="viz-arrow" type="button" title="Previous visualizer" aria-label="Previous visualizer">
            <img class="btn-icon" src="./assets/left-chevron.png" alt="Previous visualizer" />
          </button>
          <div class="viz-name-wrap" aria-live="polite">
            <span class="viz-label">Visualizer</span>
            <strong id="vizStyleName">Waveform</strong>
          </div>
          <button id="vizNextBtn" class="viz-arrow" type="button" title="Next visualizer" aria-label="Next visualizer">
            <img class="btn-icon" src="./assets/right-chevron.png" alt="Next visualizer" />
          </button>
        </div>
      </div>
    </section>

    <aside class="library-card" aria-label="Song library">
      <div class="library-head">
        <h2>Library</h2>
        <p id="libraryCount">7 tracks from Free Music Archive</p>
      </div>
      <div id="libraryList" class="library-list" role="listbox" aria-label="Playlist"></div>
    </aside>
  </main>

  <audio id="audio" crossorigin="anonymous" preload="metadata"></audio>

  <script>
    (() => {
      "use strict";

      // TEMPORARY diagnostic (2026-05-29): trace init + visualizer so a
      // runtime failure (library/visualizer not appearing) leaves a log at
      // sdmc:/swb_player.log. Capped so it can't fill the card. Remove once
      // the visualizer port is verified on-device.
      function plog(_msg) {
        // Diagnostic logging disabled: synchronous SD-card writes
        // (Switch.appendFileSync) on the main thread cost frames during
        // playback. Kept as a no-op so the existing call sites stay valid.
      }
      plog("[swp] script start " + new Date().toISOString());

      // Populated at startup from config.json's `audioFilesPath` (the
      // local folder of audio files on the SD card). See
      // loadPlaylistFromConfig().
      let playlist = [];

      const AUDIO_EXTENSIONS = [".mp3", ".m4a", ".aac", ".flac", ".wav", ".ogg", ".oga", ".opus"];

      // Read + parse config.json from the SD card (synchronous — page
      // scripts can use Switch.readFileSync; no fetch to hang on). Parsed
      // once and cached. Returns {} if no config / parse error, so every
      // reader falls back to its own defaults and the player still works
      // without a config file.
      let cachedConfig = null;
      function readConfig() {
        if (cachedConfig) return cachedConfig;
        cachedConfig = {};
        const sw = globalThis.Switch;
        if (!sw || typeof sw.readFileSync !== "function") return cachedConfig;
        const candidates = [
          "sdmc:/switch/brewser/apps/SpectraPlay/config.json",
          "romfs:/apps/SpectraPlay/config.json",
        ];
        for (const path of candidates) {
          try {
            const buf = sw.readFileSync(path);
            if (!buf) continue;
            const cfg = JSON.parse(new TextDecoder().decode(buf));
            if (cfg && typeof cfg === "object") { cachedConfig = cfg; break; }
          } catch (_) { /* try next candidate */ }
        }
        return cachedConfig;
      }

      function readAudioFilesPath() {
        const cfg = readConfig();
        if (cfg && typeof cfg.audioFilesPath === "string" && cfg.audioFilesPath.trim()) {
          return cfg.audioFilesPath.trim();
        }
        return "/music/";
      }

      // Enumerate the configured folder and build the playlist from the
      // real audio files found there. Local files mean the player works
      // with no internet.
      function loadPlaylistFromConfig() {
        const sw = globalThis.Switch;
        const audioFilesPath = readAudioFilesPath();
        // Resolve to an absolute path the media decoder + native fs APIs
        // understand. `sdmc:`/`romfs:` pass through; a bare/leading-slash
        // path is taken relative to the SD-card root.
        let dir = audioFilesPath.replace(/\\/g, "/");
        if (!/^[a-z]+:\//i.test(dir)) {
          dir = "sdmc:" + (dir.charAt(0) === "/" ? dir : "/" + dir);
        }
        if (dir.charAt(dir.length - 1) !== "/") dir += "/";

        let names = [];
        try {
          if (sw && typeof sw.readDirSync === "function") {
            names = sw.readDirSync(dir) || [];
          }
        } catch (_) { names = []; }

        const tracks = [];
        for (const name of names) {
          if (typeof name !== "string") continue;
          const lower = name.toLowerCase();
          if (!AUDIO_EXTENSIONS.some((ext) => lower.endsWith(ext))) continue;
          const dot = name.lastIndexOf(".");
          tracks.push({
            title: dot > 0 ? name.slice(0, dot) : name,
            artist: "Local file",
            url: dir + name,
          });
        }
        tracks.sort((a, b) => (a.title < b.title ? -1 : a.title > b.title ? 1 : 0));
        playlist = tracks;
      }

      // ----- ID3v2 tag extraction (MP3 Title / Artist) -----
      // Read only the head of the file (the ID3v2 tag lives at the start) via
      // Switch.readFileSync's byte-range option — parsed from absolute offset
      // 0 so it's correct even if the runtime ignores the range and returns
      // the whole file. Lazy: parsed once per track on first play, cached.
      function decodeLatin1(bytes) {
        let out = "";
        for (let i = 0; i < bytes.length; i++) { if (bytes[i] === 0) break; out += String.fromCharCode(bytes[i]); }
        return out;
      }
      function decodeUtf16(bytes, littleEndian) {
        let out = "";
        for (let i = 0; i + 1 < bytes.length; i += 2) {
          const code = littleEndian ? (bytes[i] | (bytes[i + 1] << 8)) : ((bytes[i] << 8) | bytes[i + 1]);
          if (code === 0) break;
          out += String.fromCharCode(code);
        }
        return out;
      }
      function decodeId3Text(b, start, end) {
        if (start >= end) return "";
        const enc = b[start];
        const data = b.subarray(start + 1, end);
        let s;
        if (enc === 1) {                       // UTF-16 with BOM
          let le = true, off = 0;
          if (data.length >= 2 && data[0] === 0xFF && data[1] === 0xFE) { le = true; off = 2; }
          else if (data.length >= 2 && data[0] === 0xFE && data[1] === 0xFF) { le = false; off = 2; }
          s = decodeUtf16(data.subarray(off), le);
        } else if (enc === 2) {                // UTF-16BE, no BOM
          s = decodeUtf16(data, false);
        } else if (enc === 3) {                // UTF-8
          try { s = new TextDecoder("utf-8").decode(data); } catch (_) { s = decodeLatin1(data); }
        } else {                               // ISO-8859-1
          s = decodeLatin1(data);
        }
        return s.replace(/\0+$/, "").trim();
      }
      function parseId3Frames(b, major, start, end) {
        let title = "", artist = "";
        let i = start;
        if (major === 2) {                     // ID3v2.2: 3-char IDs, 3-byte sizes
          while (i + 6 <= end) {
            const id = String.fromCharCode(b[i], b[i + 1], b[i + 2]);
            if (!/^[A-Z0-9]{3}$/.test(id)) break;
            const sz = (b[i + 3] << 16) | (b[i + 4] << 8) | b[i + 5];
            const fs = i + 6;
            if (sz <= 0 || fs + sz > end) break;
            if (id === "TT2") title = decodeId3Text(b, fs, fs + sz);
            else if (id === "TP1") artist = decodeId3Text(b, fs, fs + sz);
            i = fs + sz;
            if (title && artist) break;
          }
        } else {                               // ID3v2.3 / v2.4: 4-char IDs, 4-byte sizes
          while (i + 10 <= end) {
            const id = String.fromCharCode(b[i], b[i + 1], b[i + 2], b[i + 3]);
            if (!/^[A-Z0-9]{4}$/.test(id)) break;
            const sz = major === 4
              ? (((b[i + 4] & 0x7f) << 21) | ((b[i + 5] & 0x7f) << 14) | ((b[i + 6] & 0x7f) << 7) | (b[i + 7] & 0x7f))
              : ((b[i + 4] << 24) | (b[i + 5] << 16) | (b[i + 6] << 8) | b[i + 7]);
            const fs = i + 10;
            if (sz <= 0 || fs + sz > end) break;
            if (id === "TIT2") title = decodeId3Text(b, fs, fs + sz);
            else if (id === "TPE1") artist = decodeId3Text(b, fs, fs + sz);
            i = fs + sz;
            if (title && artist) break;
          }
        }
        return (title || artist) ? { title: title, artist: artist } : null;
      }
      function readTrackTags(url, cap) {
        const sw = globalThis.Switch;
        if (!sw || typeof sw.readFileSync !== "function") return null;
        const CAP = cap || 256 * 1024;
        let buf;
        try { buf = sw.readFileSync(url, { start: 0, end: CAP - 1 }); } catch (_) { return null; }
        if (!buf) return null;
        const b = new Uint8Array(buf);
        // "ID3" magic + a major version we understand.
        if (b.length < 10 || b[0] !== 0x49 || b[1] !== 0x44 || b[2] !== 0x33) return null;
        const major = b[3];
        const size = ((b[6] & 0x7f) << 21) | ((b[7] & 0x7f) << 14) | ((b[8] & 0x7f) << 7) | (b[9] & 0x7f);
        const tagEnd = Math.min(10 + size, b.length);
        try { return parseId3Frames(b, major, 10, tagEnd); } catch (_) { return null; }
      }
      function ensureTags(track, cap) {
        if (!track || track._tagsDone) return;
        track._tagsDone = true;
        const t = readTrackTags(track.url, cap);
        if (t) {
          if (t.title) track.title = t.title;
          if (t.artist) track.artist = t.artist;
        }
      }

      // Update just the selected track's library row in place to its real
      // Title / Artist. Mutating the two text spans (not rebuilding the list
      // via innerHTML, which broke the scroll overlay) keeps it the same
      // lightweight mutation as the active-state class toggle. Row markup
      // order is [num span, <strong> title, <span> subtitle].
      function updateLibraryRowMeta(index) {
        const button = libraryList.children[index];
        if (!button || !button.children) return;
        const track = playlist[index];
        if (!track) return;
        const kids = button.children;
        if (kids[1]) kids[1].textContent = track.title;
        if (kids[2]) {
          kids[2].textContent = (track.artist && track.artist !== "Local file")
            ? track.artist
            : ("Local file · " + shortenUrl(track.url));
        }
      }

      // Toast the current track's Title / Artist once per fresh start (not on
      // resume), and reflect it in that track's library row. Tags are parsed
      // lazily here, only for the track being played.
      function announceTrack() {
        if (announcedIndex === currentIndex) return;
        announcedIndex = currentIndex;
        const idx = currentIndex;
        // Defer the tag read off the play/render critical path: the
        // synchronous Switch.readFileSync would otherwise stall the frame
        // that starts playback. The toast + library-row update follow once
        // parsed. Small read cap keeps the one-time hitch minimal (Title /
        // Artist frames live at the very start of the ID3 tag).
        setTimeout(() => {
          const track = playlist[idx];
          if (!track || idx !== currentIndex) return;
          try { ensureTags(track, 64 * 1024); } catch (_) { /* fall back to filename */ }
          const title = track.title || "Unknown track";
          const artist = (track.artist && track.artist !== "Local file") ? track.artist : "";
          showToast(artist ? (title + " - " + artist) : title);
          try { updateLibraryRowMeta(idx); } catch (_) { /* row stays as-is */ }
        }, 0);
      }

      const $ = (selector) => document.querySelector(selector);
      const audio = $("#audio");
      const canvas = $("#visualizer");
      const visualizerCard = $(".visualizer-card");
      const statusPill = $("#statusPill");
      const statusText = $("#statusText");
      const toast = $("#toast");
      const currentTimeEl = $("#currentTime");
      const durationEl = $("#duration");
      const seek = $("#seek");
      const playBtn = $("#playBtn");
      const prevBtn = $("#prevBtn");
      const nextBtn = $("#nextBtn");
      const shuffleBtn = $("#shuffleBtn");
      const repeatBtn = $("#repeatBtn");
      const muteBtn = $("#muteBtn");
      const volume = $("#volume");
      const vizPrevBtn = $("#vizPrevBtn");
      const vizNextBtn = $("#vizNextBtn");
      const vizStyleName = $("#vizStyleName");
      const libraryList = $("#libraryList");
      const libraryCount = $("#libraryCount");

      let currentIndex = 0;
      let isShuffle = false;
      let repeatMode = 0;
      // Guards the end-of-track auto-advance so it fires once per finish.
      // The runtime doesn't reliably set `audio.ended` and stops a track a
      // second or two before the reported duration, so the UI poll detects
      // the end heuristically and uses this latch.
      let endedHandled = false;
      // Whether playback is INTENDED to be running (set from markTransport).
      // End-detection only auto-advances when this is true, so a manual
      // pause — which also freezes currentTime — never advances the track.
      let expectPlaying = false;
      // Index whose "now playing" toast has been shown for the current load,
      // so resuming after a pause doesn't re-announce. Reset by loadTrack.
      let announcedIndex = -1;
      let seeking = false;
      let toastTimer = 0;
      let uiPollTimer = 0;
      let audioContext = null;
      let analyser = null;
      let sourceNode = null;
      let timeData = null;
      let freqData = null;
      let analyserReady = false;
      let smoothedEnergy = 0;
      let smoothedBass = 0;
      let currentVisualizerStyle = 0;
      const visualizerStyles = [
        "Waveform",
        "Bars",
        "Orbit",
        "Radial Bars",
        "Mirror Wave",
        "Spectrum Line",
        "Pulse Rings",
        "Particles",
        "Nebula"
      ];

      // ===== Audio-reactive WebGL2 visualizer (faithful port) =====
      // Ported from the desktop modern_webgl_audio_player: CPU builds the
      // per-style geometry each frame and draws it through a shared
      // color-palette shader (TRIANGLE_STRIP / TRIANGLES / LINE_STRIP /
      // POINTS). Adaptations for the nx.js bridge:
      //   - Shaders carry `#pragma raw_passthrough` so the custom aPosition /
      //     uColor / uTime / uPalette names run on native GLES (the bridge's
      //     hardcoded program doesn't know them). [[bridge-raw-shader-passthrough]]
      //   - aPosition is bound to attribute location 0 so nx.js's drawArrays
      //     position-attrib gate passes. [[drawarrays-position-attrib-gate]]
      //   - Render resolution tracks the canvas's layout box so the inline
      //     bridge->screen copy lines up 1:1; vertex Y can be flipped via a
      //     uniform (the bridge FBO orientation differs from desktop).
      //   - The AnalyserNode is replaced by the native decoder's play-head
      //     spectrum (audio.getFrequencyData) + waveform (audio.getWaveform).
      const SAMPLES = 1024;       // wave sample count the builders iterate
      const SPEC_BINS = 128;      // native spectrum length
      const WAVE_LEN = 256;       // native waveform length
      const specData = new Float32Array(SPEC_BINS);
      const waveData = new Float32Array(WAVE_LEN);
      let haveFreq = false, haveWave = false;

      // Tunables — defaults here, overridable from config.json's "visualizer"
      // block (no rebuild needed):
      //   "visualizer": { "gain": 30, "waveGain": 1.4, "flipY": false,
      //                   "bgAlpha": 0, "vividness": 0.5,
      //                   "bars": 20, "waveform": 256, ... }
      let vizFreqGain = 30.0;     // native FFT magnitude -> ~0..1 spectrum
      let vizWaveGain = 1.4;      // waveform amplitude scale
      let vizFlipY = 1.0;         // vertex Y sign (set flipY:true -> -1 to invert)
      // Background opacity: 0 = fully transparent (the card grid behind shows
      // through, like the desktop original), 1 = solid dark backdrop. The
      // bridge composites the canvas over the card via src-over alpha blend.
      let vizBgAlpha = 0.0;
      // Vividness (0..1) lifts each draw's per-layer alpha toward opaque so the
      // geometry composites punchy over the transparent card grid instead of
      // washing out. 0 = raw per-layer alphas (dull); higher = gamma-lifted
      // toward 1 (mains go near-solid, glow layers stay proportionally dimmer).
      let vizVividness = 0.5;
      // Per-visual geometry counts. Each visual exposes ONE exact count as a
      // key directly in config.json's "visualizer" block — it's the real number of
      // samples/segments built per frame (e.g. "bars": 7 draws 7 frequency
      // bars and reads 7 spectrum samples), so lowering it cuts CPU work and
      // raises FPS; it is not a cosmetic trim. The secondary "glow"/"alt"
      // passes some visuals draw derive from the primary, so every visual
      // stays a single knob. Defaults below preserve the prior density.
      const VIZ_COUNT_DEFAULTS = {
        waveform: 256,      // ribbon points along the wave (style 0)
        bars: 43,           // frequency bars (style 1)
        orbit: 210,         // radial samples around the orbit ring (style 2)
        radialBars: 64,     // bars around the radial dial (style 3)
        mirrorWave: 210,    // points along each mirrored wave line (style 4)
        spectrumLine: 120,  // points along the spectrum line (style 5)
        pulseRings: 90,     // points per pulse ring (style 6)
        particles: 360,     // particle count (style 7)
        nebula: 140         // segments per nebula arm (style 8)
      };
      // Clamp ranges keep a too-small/too-large value from breaking a strip or
      // tanking perf; [min, max] per visual.
      const VIZ_COUNT_RANGE = {
        waveform: [8, 1024], bars: [1, 256], orbit: [8, 720],
        radialBars: [3, 360], mirrorWave: [8, 720], spectrumLine: [8, 480],
        pulseRings: [6, 360], particles: [16, 2000], nebula: [8, 600]
      };

      // Resolved counts the draw functions read (set by loadVisualizerConfig).
      let qcRibbon = VIZ_COUNT_DEFAULTS.waveform;
      let qcBarsMain = VIZ_COUNT_DEFAULTS.bars, qcBarsGlow = 22;
      let qcOrbit = VIZ_COUNT_DEFAULTS.orbit;
      let qcRadialMain = VIZ_COUNT_DEFAULTS.radialBars, qcRadialGlow = 32;
      let qcMirror = VIZ_COUNT_DEFAULTS.mirrorWave;
      let qcSpecMain = VIZ_COUNT_DEFAULTS.spectrumLine, qcSpecAlt = 80;
      let qcRingPts = VIZ_COUNT_DEFAULTS.pulseRings;
      let qcParticles = VIZ_COUNT_DEFAULTS.particles;
      let qcNebula = VIZ_COUNT_DEFAULTS.nebula;

      function applyVisualizerCounts(counts) {
        const c = (counts && typeof counts === "object") ? counts : {};
        const pick = (key) => {
          const r = VIZ_COUNT_RANGE[key];
          const val = c[key];
          const base = (typeof val === "number" && isFinite(val)) ? val : VIZ_COUNT_DEFAULTS[key];
          return Math.max(r[0], Math.min(r[1], Math.round(base)));
        };
        qcRibbon = pick("waveform");
        qcBarsMain = pick("bars");          qcBarsGlow = Math.max(1, Math.round(qcBarsMain * 0.5));
        qcOrbit = pick("orbit");
        qcRadialMain = pick("radialBars");  qcRadialGlow = Math.max(1, Math.round(qcRadialMain * 0.5));
        qcMirror = pick("mirrorWave");
        qcSpecMain = pick("spectrumLine");  qcSpecAlt = Math.max(2, Math.round(qcSpecMain * 0.667));
        qcRingPts = pick("pulseRings");
        qcParticles = pick("particles");
        qcNebula = pick("nebula");
      }

      function loadVisualizerConfig() {
        const v = readConfig().visualizer;
        const num = (x, lo, hi, dflt) =>
          (typeof x === "number" && isFinite(x)) ? Math.max(lo, Math.min(hi, x)) : dflt;
        if (v && typeof v === "object") {
          vizFreqGain = num(v.gain, 0, 500, vizFreqGain);
          vizWaveGain = num(v.waveGain, 0, 20, vizWaveGain);
          vizBgAlpha = num(v.bgAlpha, 0, 1, vizBgAlpha);
          vizVividness = num(v.vividness, 0, 1, vizVividness);
          if (typeof v.flipY === "boolean") vizFlipY = v.flipY ? -1.0 : 1.0;
        }
        applyVisualizerCounts(v);
      }

      let gl = null;
      let program = null;
      let positionLocation = null, colorLocation = null;
      let timeLocation = null, paletteLocation = null, flipYLocation = null;
      let buffer = null, vizVao = null;
      let vertexData = new Float32Array(0);
      let vizW = 0, vizH = 0, vizPollCounter = 0, vizStarted = false;
      // smoothedEnergy / smoothedBass are declared in the state block above.

      const VIZ_VERT = `#version 300 es
#pragma raw_passthrough
precision highp float;
in vec2 aPosition;
uniform float uFlipY;
out vec2 vPosition;
void main() {
  vPosition = aPosition;
  gl_Position = vec4(aPosition.x, aPosition.y * uFlipY, 0.0, 1.0);
  gl_PointSize = 3.4;
}`;

      const VIZ_FRAG = `#version 300 es
#pragma raw_passthrough
precision highp float;
uniform vec4 uColor;
uniform float uTime;
uniform float uPalette;
in vec2 vPosition;
out vec4 outColor;

vec3 cosinePalette(float t, vec3 a, vec3 b, vec3 c, vec3 d) {
  return a + b * cos(6.2831853 * (c * t + d));
}

vec3 palette(float t) {
  float p = floor(uPalette + 0.5);
  float radius = length(vPosition);
  float angle = vPosition.x * 0.31 + vPosition.y * 0.23 + sin(radius * 2.2 + uTime * 0.18) * 0.08;

  if (p < 0.5) {
    return cosinePalette(t + angle * 0.45, vec3(0.58), vec3(0.46), vec3(1.00, 0.72, 0.38), vec3(0.02, 0.42, 0.68));
  } else if (p < 1.5) {
    float stripe = floor((vPosition.x + 1.0) * 18.0);
    return cosinePalette(t * 0.35 + stripe * 0.075, vec3(0.55), vec3(0.50), vec3(1.20, 0.85, 0.55), vec3(0.00, 0.18, 0.52));
  } else if (p < 2.5) {
    return cosinePalette(radius * 1.15 - t * 0.35, vec3(0.68, 0.38, 0.22), vec3(0.34, 0.28, 0.22), vec3(0.80, 0.55, 0.35), vec3(0.00, 0.08, 0.23));
  } else if (p < 3.5) {
    return cosinePalette(angle * 1.25 + t * 0.28, vec3(0.45, 0.62, 0.42), vec3(0.42, 0.38, 0.34), vec3(0.65, 0.95, 0.50), vec3(0.18, 0.00, 0.42));
  } else if (p < 4.5) {
    return cosinePalette(vPosition.y * 0.9 + t * 0.16, vec3(0.35, 0.58, 0.78), vec3(0.22, 0.32, 0.38), vec3(0.50, 0.80, 1.10), vec3(0.58, 0.34, 0.08));
  } else if (p < 5.5) {
    return cosinePalette(vPosition.x * 0.45 - t * 0.22, vec3(0.38, 0.74, 0.34), vec3(0.34, 0.34, 0.42), vec3(0.75, 1.25, 0.65), vec3(0.28, 0.03, 0.56));
  } else if (p < 6.5) {
    return cosinePalette(radius * 1.8 - t * 0.18, vec3(0.86, 0.38, 0.12), vec3(0.28, 0.18, 0.10), vec3(0.55, 0.40, 0.25), vec3(0.00, 0.10, 0.28));
  } else if (p < 7.5) {
    float sparkle = pow(max(0.0, 1.0 - radius), 1.7);
    vec3 stars = cosinePalette(t * 0.45 + sparkle, vec3(0.72, 0.68, 0.58), vec3(0.28, 0.22, 0.38), vec3(0.35, 0.65, 1.10), vec3(0.02, 0.24, 0.66));
    return mix(stars, vec3(1.0, 0.72, 0.28), sparkle * 0.55);
  }
  return cosinePalette(radius * 0.8 + angle * 0.7 - t * 0.14, vec3(0.58, 0.42, 0.72), vec3(0.35, 0.28, 0.32), vec3(0.70, 0.50, 0.85), vec3(0.78, 0.06, 0.32));
}

void main() {
  float radius = length(vPosition);
  float field = vPosition.x * 0.37 + vPosition.y * 0.29 + sin(radius * 3.0 + uTime * 0.42) * 0.07;
  float ripple = sin((vPosition.x * 2.1 + vPosition.y * 1.6 + uTime * 0.7) * 3.14159) * 0.035;
  vec3 procedural = palette(radius + field + uTime * 0.08 + ripple);
  vec3 mixed = mix(uColor.rgb, procedural, 0.72);
  mixed += procedural * uColor.a * 0.10;
  outColor = vec4(clamp(mixed, 0.0, 1.0), uColor.a);
}`;

      function setupVisualizer() {
        try {
          loadVisualizerConfig();
          plog("[swp] viz setup: gain=" + vizFreqGain + " waveGain=" + vizWaveGain + " flipY=" + vizFlipY);
          gl = canvas.getContext("webgl2", {
            alpha: true, antialias: true, depth: false,
            stencil: false, preserveDrawingBuffer: false
          });
          if (!gl) { console.debug("[swp] WebGL2 unavailable; visualizer off"); plog("[swp] viz: no WebGL2"); return false; }
          if (typeof gl.enableGpuBridgePrototype === "function") gl.enableGpuBridgePrototype(true);

          const compile = (type, src) => {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
              throw new Error((gl.getShaderInfoLog(s) || "").slice(0, 160));
            }
            return s;
          };
          const vs = compile(gl.VERTEX_SHADER, VIZ_VERT);
          const fs = compile(gl.FRAGMENT_SHADER, VIZ_FRAG);
          program = gl.createProgram();
          gl.attachShader(program, vs);
          gl.attachShader(program, fs);
          // Pin aPosition to location 0 so nx.js's drawArrays position gate
          // (attrib 0 must be enabled, FLOAT, size>=2) is satisfied.
          gl.bindAttribLocation(program, 0, "aPosition");
          gl.linkProgram(program);
          if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            throw new Error("link: " + (gl.getProgramInfoLog(program) || "").slice(0, 160));
          }
          gl.deleteShader(vs);
          gl.deleteShader(fs);

          positionLocation = gl.getAttribLocation(program, "aPosition");
          colorLocation = gl.getUniformLocation(program, "uColor");
          timeLocation = gl.getUniformLocation(program, "uTime");
          paletteLocation = gl.getUniformLocation(program, "uPalette");
          flipYLocation = gl.getUniformLocation(program, "uFlipY");

          vizVao = gl.createVertexArray();
          gl.bindVertexArray(vizVao);
          buffer = gl.createBuffer();
          gl.useProgram(program);
          gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
          gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0, 0, 0, 0, 0, 0]), gl.DYNAMIC_DRAW);
          gl.enableVertexAttribArray(positionLocation < 0 ? 0 : positionLocation);
          gl.vertexAttribPointer(positionLocation < 0 ? 0 : positionLocation, 2, gl.FLOAT, false, 0, 0);
          gl.enable(gl.BLEND);
          // Separate alpha factors: keep the standard over-blend for color, but
          // accumulate the alpha channel as true coverage (src factor ONE) so a
          // layer drawn with alpha a yields framebuffer alpha a, not a². With a
          // plain blendFunc, nx.js applies SRC_ALPHA/ONE_MINUS_SRC_ALPHA to the
          // alpha channel too (webgl.c), squaring it over the transparent FBO and
          // washing the geometry out when the bridge composites it over the card.
          gl.blendFuncSeparate(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA, gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
          plog("[swp] viz setup OK: posLoc=" + positionLocation + " glErr=0x" + (gl.getError() >>> 0).toString(16));
          return true;
        } catch (e) {
          const msg = e && e.message ? e.message : String(e);
          console.debug("[swp] visualizer setup failed:", msg);
          plog("[swp] viz setup FAILED: " + msg);
          gl = null;
          return false;
        }
      }

      function syncVisualizerSize() {
        // Render resolution must equal the canvas's on-screen layout box so
        // the inline bridge->screen copy (box.w x box.h, 1:1) lines up.
        // EXCEPT in fullscreen-canvas mode: the shell resized the backing
        // store to the whole screen and presents bridge[0,0,W,H]->screen,
        // but the live layout box is still the (stale) card cell. So read
        // the backing-store dims directly when the shell flags fullscreen.
        try {
          let w, h;
          if (globalThis.__swbBrowserMode === "fullscreen-canvas") {
            // The shell publishes the screen size it composites bridge->screen
            // from; in "live" fullscreen it doesn't resize our backing store,
            // so prefer that over canvas.width (which stays the card size).
            const fs = globalThis.__swbFullscreenCanvasSize;
            w = Math.max(2, (fs && fs.width) ? (fs.width | 0) : (canvas.width | 0));
            h = Math.max(2, (fs && fs.height) ? (fs.height | 0) : (canvas.height | 0));
          } else {
            const r = canvas.getBoundingClientRect();
            w = Math.max(2, Math.round(r.width));
            h = Math.max(2, Math.round(r.height));
          }
          if (w !== vizW || h !== vizH) {
            vizW = w; vizH = h;
            canvas.width = w; canvas.height = h;
            gl.viewport(0, 0, w, h);
          }
        } catch (_) { /* keep last size */ }
      }

      // ----- Audio sampling (native spectrum/waveform, synthetic fallback) -----
      function getWaveSample(i, now) {
        if (haveWave) {
          let idx = (i * WAVE_LEN / SAMPLES) | 0;
          if (idx >= WAVE_LEN) idx = WAVE_LEN - 1;
          return waveData[idx] * vizWaveGain;
        }
        const x = i / (SAMPLES - 1);
        return Math.sin((x * 5.0 + now * 0.00055) * Math.PI * 2.0) * 0.18 +
               Math.sin((x * 11.0 - now * 0.00034) * Math.PI * 2.0) * 0.06;
      }

      function getFrequencyLevel(index, total, now) {
        if (haveFreq) {
          const normalized = index / Math.max(1, total - 1);
          const bin = Math.min(SPEC_BINS - 1, Math.floor(Math.pow(normalized, 1.65) * (SPEC_BINS - 1)));
          return Math.min(1, specData[bin] * vizFreqGain);
        }
        return 0.22 + Math.abs(Math.sin(now * 0.0018 + index * 0.42)) * 0.5;
      }

      function updateAudioEnergy() {
        if (!haveWave && !haveFreq) {
          smoothedEnergy = smoothedEnergy * 0.96 + 0.055 * 0.04;
          smoothedBass = smoothedBass * 0.96 + 0.05 * 0.04;
          return;
        }
        let rms = 0;
        if (haveWave) {
          let sum = 0;
          for (let i = 0; i < WAVE_LEN; i++) { const v = waveData[i] * vizWaveGain; sum += v * v; }
          rms = Math.sqrt(sum / WAVE_LEN);
        }
        let bass = 0;
        if (haveFreq) {
          const n = Math.min(10, SPEC_BINS);
          let bs = 0;
          for (let i = 0; i < n; i++) bs += Math.min(1, specData[i] * vizFreqGain);
          bass = bs / n;
        }
        smoothedEnergy = smoothedEnergy * 0.83 + rms * 0.17;
        smoothedBass = smoothedBass * 0.84 + bass * 0.16;
      }

      function setDrawColor(color, now, phase, paletteIndex) {
        const pulse = 0.5 + 0.5 * Math.sin(now * 0.0011 + phase);
        const shimmer = 0.5 + 0.5 * Math.cos(now * 0.00073 + phase * 1.7);
        gl.uniform1f(paletteLocation, paletteIndex);
        // Gamma-lift the layer alpha toward opaque (exponent <1 raises low
        // alphas the most, preserving the main-vs-glow ordering). vividness 0
        // leaves it untouched.
        const liftedAlpha = Math.pow(color[3], 1 - 0.6 * vizVividness);
        gl.uniform4f(
          colorLocation,
          Math.min(1, color[0] + pulse * 0.10),
          Math.min(1, color[1] + shimmer * 0.08),
          Math.min(1, color[2] + (1 - pulse) * 0.10),
          liftedAlpha
        );
      }

      // ----- Geometry builders + draws (ported 1:1) -----
      function buildRibbonVertices(thickness, now, scale, points) {
        const vertexCount = points * 2;
        if (vertexData.length !== vertexCount * 2) vertexData = new Float32Array(vertexCount * 2);
        let cursor = 0;
        for (let i = 0; i < points; i++) {
          const t = points > 1 ? i / (points - 1) : 0;
          const x = -1 + t * 2;
          const sampleIndex = (t * (SAMPLES - 1)) | 0;
          const sample = getWaveSample(sampleIndex, now);
          const wobble = Math.sin(now * 0.0012 + i * 0.019) * 0.012 * (0.5 + smoothedBass * 2.2);
          const y = Math.max(-0.88, Math.min(0.88, sample * scale + wobble));
          const adaptiveThickness = thickness * (1 + smoothedBass * 1.75);
          vertexData[cursor++] = x;
          vertexData[cursor++] = Math.max(-0.96, Math.min(0.96, y + adaptiveThickness));
          vertexData[cursor++] = x;
          vertexData[cursor++] = Math.max(-0.96, Math.min(0.96, y - adaptiveThickness));
        }
        return vertexCount;
      }

      function drawRibbon(thickness, color, now, scale, phase) {
        const vertexCount = buildRibbonVertices(thickness, now, scale, qcRibbon);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor(color, now, phase || 0, 0);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, vertexCount);
      }

      function buildBarVertices(totalBars, now) {
        const vertexCount = totalBars * 6;
        if (vertexData.length !== vertexCount * 2) vertexData = new Float32Array(vertexCount * 2);
        let cursor = 0;
        const slot = 2 / totalBars;
        const barWidth = slot * 0.62;
        const base = -0.74;
        for (let i = 0; i < totalBars; i++) {
          const level = getFrequencyLevel(i, totalBars, now);
          const eased = Math.pow(level, 0.72);
          const xCenter = -1 + slot * (i + 0.5);
          const x0 = xCenter - barWidth / 2;
          const x1 = xCenter + barWidth / 2;
          const y0 = base;
          const y1 = Math.min(0.9, base + 0.10 + eased * 1.48 + smoothedBass * 0.22);
          vertexData[cursor++] = x0; vertexData[cursor++] = y0;
          vertexData[cursor++] = x1; vertexData[cursor++] = y0;
          vertexData[cursor++] = x0; vertexData[cursor++] = y1;
          vertexData[cursor++] = x0; vertexData[cursor++] = y1;
          vertexData[cursor++] = x1; vertexData[cursor++] = y0;
          vertexData[cursor++] = x1; vertexData[cursor++] = y1;
        }
        return vertexCount;
      }

      function drawFrequencyBars(now) {
        let vertexCount = buildBarVertices(qcBarsMain, now);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([1.00, 0.24, 0.78, 0.54], now, 0.3, 1);
        gl.drawArrays(gl.TRIANGLES, 0, vertexCount);
        const glowCount = buildBarVertices(qcBarsGlow, now + 220);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([0.18, 0.72, 1.00, 0.20], now, 2.1, 1);
        gl.drawArrays(gl.TRIANGLES, 0, glowCount);
      }

      function buildOrbitVertices(now, scale, radiusOffset, radialSamples) {
        const vertexCount = (radialSamples + 1) * 2;
        if (vertexData.length !== vertexCount * 2) vertexData = new Float32Array(vertexCount * 2);
        let cursor = 0;
        for (let i = 0; i <= radialSamples; i++) {
          const sampleIndex = Math.floor((i / radialSamples) * (SAMPLES - 1));
          const angle = (i / radialSamples) * Math.PI * 2 - Math.PI / 2;
          const sample = Math.abs(getWaveSample(sampleIndex, now));
          const pulse = sample * 0.24 * scale + smoothedBass * 0.16 + radiusOffset;
          const inner = 0.33 + pulse;
          const outer = 0.43 + pulse + smoothedEnergy * 0.18;
          const cos = Math.cos(angle), sin = Math.sin(angle);
          vertexData[cursor++] = cos * inner; vertexData[cursor++] = sin * inner;
          vertexData[cursor++] = cos * outer; vertexData[cursor++] = sin * outer;
        }
        return vertexCount;
      }

      function drawOrbitWave(now, scale) {
        const glowCount = buildOrbitVertices(now, scale * 0.8, 0.045, qcOrbit);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([1.00, 0.32, 0.88, 0.18], now, 1.4, 2);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, glowCount);
        const vertexCount = buildOrbitVertices(now, scale, 0, qcOrbit);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([0.35, 1.00, 0.86, 0.82], now, 3.2, 2);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, vertexCount);
      }

      function random01(seed) {
        const v = Math.sin(seed * 12.9898 + 78.233) * 43758.5453123 % 1;
        return v < 0 ? v + 1 : v;
      }

      function buildRadialBarVertices(totalBars, now) {
        const vertexCount = totalBars * 6;
        if (vertexData.length !== vertexCount * 2) vertexData = new Float32Array(vertexCount * 2);
        let cursor = 0;
        const rotation = now * 0.00028;
        const inner = 0.21 + smoothedBass * 0.08;
        for (let i = 0; i < totalBars; i++) {
          const level = Math.pow(getFrequencyLevel(i, totalBars, now), 0.64);
          const angle0 = rotation + (i / totalBars) * Math.PI * 2;
          const angle1 = rotation + ((i + 0.58) / totalBars) * Math.PI * 2;
          const outer = Math.min(0.94, inner + 0.14 + level * 0.58 + smoothedBass * 0.10);
          const p0 = [Math.cos(angle0) * inner, Math.sin(angle0) * inner];
          const p1 = [Math.cos(angle1) * inner, Math.sin(angle1) * inner];
          const p2 = [Math.cos(angle0) * outer, Math.sin(angle0) * outer];
          const p3 = [Math.cos(angle1) * outer, Math.sin(angle1) * outer];
          vertexData[cursor++] = p0[0]; vertexData[cursor++] = p0[1];
          vertexData[cursor++] = p1[0]; vertexData[cursor++] = p1[1];
          vertexData[cursor++] = p2[0]; vertexData[cursor++] = p2[1];
          vertexData[cursor++] = p2[0]; vertexData[cursor++] = p2[1];
          vertexData[cursor++] = p1[0]; vertexData[cursor++] = p1[1];
          vertexData[cursor++] = p3[0]; vertexData[cursor++] = p3[1];
        }
        return vertexCount;
      }

      function drawRadialBars(now) {
        const glowCount = buildRadialBarVertices(qcRadialGlow, now + 180);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([1.00, 0.78, 0.20, 0.22], now, 0.7, 3);
        gl.drawArrays(gl.TRIANGLES, 0, glowCount);
        const vertexCount = buildRadialBarVertices(qcRadialMain, now);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([0.28, 0.82, 1.00, 0.54], now, 2.4, 3);
        gl.drawArrays(gl.TRIANGLES, 0, vertexCount);
      }

      function buildMirrorWaveLineVertices(total, now, scale, sign) {
        if (vertexData.length !== total * 2) vertexData = new Float32Array(total * 2);
        let cursor = 0;
        for (let i = 0; i < total; i++) {
          const x = -0.96 + (i / (total - 1)) * 1.92;
          const sampleIndex = Math.floor((i / (total - 1)) * (SAMPLES - 1));
          const sample = Math.abs(getWaveSample(sampleIndex, now));
          const wave = sample * 0.74 * scale + smoothedBass * 0.12;
          const ripple = Math.sin(now * 0.001 + i * 0.07) * 0.018;
          vertexData[cursor++] = x;
          vertexData[cursor++] = sign * (0.05 + wave + ripple);
        }
        return total;
      }

      function drawMirrorWave(now, scale) {
        let vertexCount = buildMirrorWaveLineVertices(qcMirror, now, scale, 1);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([1.00, 0.22, 0.70, 0.82], now, 1.1, 4);
        gl.drawArrays(gl.LINE_STRIP, 0, vertexCount);
        vertexCount = buildMirrorWaveLineVertices(qcMirror, now, scale, -1);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([0.18, 1.00, 0.72, 0.70], now, 3.8, 4);
        gl.drawArrays(gl.LINE_STRIP, 0, vertexCount);
      }

      function buildSpectrumLineVertices(total, now, offset) {
        if (vertexData.length !== total * 2) vertexData = new Float32Array(total * 2);
        let cursor = 0;
        for (let i = 0; i < total; i++) {
          const x = -0.95 + (i / (total - 1)) * 1.9;
          const level = Math.pow(getFrequencyLevel((i + offset) % total, total, now), 0.72);
          const y = -0.72 + level * 1.48 + Math.sin(now * 0.0012 + i * 0.05) * 0.022;
          vertexData[cursor++] = x;
          vertexData[cursor++] = Math.max(-0.86, Math.min(0.9, y));
        }
        return total;
      }

      function drawSpectrumLine(now) {
        let vertexCount = buildSpectrumLineVertices(qcSpecMain, now, 0);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([0.18, 0.72, 1.00, 0.86], now, 2.2, 5);
        gl.drawArrays(gl.LINE_STRIP, 0, vertexCount);
        vertexCount = buildSpectrumLineVertices(qcSpecAlt, now + 260, 37);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([1.00, 0.36, 0.92, 0.34], now, 4.2, 5);
        gl.drawArrays(gl.LINE_STRIP, 0, vertexCount);
      }

      function writePolar(cursor, angle, radius) {
        vertexData[cursor++] = Math.cos(angle) * radius;
        vertexData[cursor++] = Math.sin(angle) * radius;
        return cursor;
      }

      function buildPulseRingVertices(points, radius, thickness, now, phase) {
        const vertexCount = (points + 1) * 2;
        if (vertexData.length !== vertexCount * 2) vertexData = new Float32Array(vertexCount * 2);
        let cursor = 0;
        for (let i = 0; i <= points; i++) {
          const angle = (i / points) * Math.PI * 2;
          const level = getFrequencyLevel((i + phase) % points, points, now);
          const wobble = Math.sin(angle * 5 + now * 0.0013 + phase) * 0.012 + level * 0.035 + smoothedBass * 0.035;
          const inner = radius - thickness + wobble;
          const outer = radius + thickness + wobble + smoothedEnergy * 0.08;
          cursor = writePolar(cursor, angle, inner);
          cursor = writePolar(cursor, angle, outer);
        }
        return vertexCount;
      }

      function drawPulseRings(now) {
        const rings = [0.18, 0.33, 0.49, 0.66];
        rings.forEach((radius, index) => {
          const vertexCount = buildPulseRingVertices(qcRingPts, radius, 0.006 + index * 0.002, now, index * 19);
          gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
          const alpha = 0.42 - index * 0.045;
          setDrawColor(
            index % 3 === 0 ? [1.00, 0.28, 0.14, alpha] : index % 3 === 1 ? [1.00, 0.70, 0.10, alpha] : [1.00, 0.10, 0.04, alpha],
            now, index * 1.4, 6
          );
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, vertexCount);
        });
      }

      function buildParticleVertices(total, now) {
        if (vertexData.length !== total * 2) vertexData = new Float32Array(total * 2);
        let cursor = 0;
        for (let i = 0; i < total; i++) {
          const seedA = random01(i + 11.1);
          const seedB = random01(i + 91.7);
          const speed = 0.00016 + seedA * 0.00034;
          const angle = seedA * Math.PI * 2 + now * speed * (seedB > 0.5 ? 1 : -1);
          const band = Math.floor(seedB * 128);
          const level = getFrequencyLevel(band, 128, now);
          const radius = Math.sqrt(seedB) * (0.16 + 0.82 * (0.55 + level * 0.55 + smoothedEnergy));
          vertexData[cursor++] = Math.cos(angle) * radius + Math.sin(now * 0.0007 + i) * 0.018 * level;
          vertexData[cursor++] = Math.sin(angle) * radius + Math.cos(now * 0.0006 + i) * 0.018 * level;
        }
        return total;
      }

      function drawParticles(now) {
        const vertexCount = buildParticleVertices(qcParticles, now);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([1.00, 0.88, 0.28, 0.82], now, 5.4, 7);
        gl.drawArrays(gl.POINTS, 0, vertexCount);
      }

      function buildNebulaVertices(segments, now, phase, scale) {
        const vertexCount = (segments + 1) * 2;
        if (vertexData.length !== vertexCount * 2) vertexData = new Float32Array(vertexCount * 2);
        let cursor = 0;
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          const level = getFrequencyLevel(i + phase * 17, segments, now);
          const angle = phase + t * Math.PI * 8.5 + now * 0.00016 * (phase + 1);
          const radius = (0.08 + t * 0.78 + level * 0.045 + smoothedBass * 0.08) * scale;
          const width = 0.025 + level * 0.055 + smoothedEnergy * 0.06;
          const nx = Math.cos(angle + Math.PI / 2);
          const ny = Math.sin(angle + Math.PI / 2);
          const cx = Math.cos(angle) * radius;
          const cy = Math.sin(angle) * radius;
          vertexData[cursor++] = cx - nx * width; vertexData[cursor++] = cy - ny * width;
          vertexData[cursor++] = cx + nx * width; vertexData[cursor++] = cy + ny * width;
        }
        return vertexCount;
      }

      function drawNebula(now) {
        let vertexCount = buildNebulaVertices(qcNebula, now, 0.0, 1.0);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([1.00, 0.22, 0.82, 0.26], now, 1.6, 8);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, vertexCount);
        vertexCount = buildNebulaVertices(qcNebula, now + 360, 2.1, 0.88);
        gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.DYNAMIC_DRAW);
        setDrawColor([0.20, 0.96, 1.00, 0.24], now, 4.7, 8);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, vertexCount);
      }

      const VIZ_BACKGROUNDS = [
        [0.040, 0.018, 0.080], [0.018, 0.030, 0.058], [0.085, 0.030, 0.018],
        [0.016, 0.060, 0.045], [0.018, 0.040, 0.082], [0.025, 0.055, 0.018],
        [0.090, 0.025, 0.010], [0.030, 0.024, 0.045], [0.055, 0.026, 0.078]
      ];

      function renderVisualizer(now) {
        if (!gl || !program) return;
        requestAnimationFrame(renderVisualizer);
        if ((vizPollCounter++ % 20) === 0 || vizW === 0) syncVisualizerSize();
        if (vizW === 0 || vizH === 0) return;
        if (typeof now !== "number") now = 0;

        // Pull native play-head spectrum + waveform (synthetic fallback when
        // not playing / no audio).
        haveFreq = false; haveWave = false;
        try { haveFreq = audio.getFrequencyData(specData) === true; } catch (_) {}
        try { haveWave = audio.getWaveform(waveData) === true; } catch (_) {}
        updateAudioEnergy();

        const bgPulse = 0.5 + 0.5 * Math.sin(now * 0.00045);
        const bgPulse2 = 0.5 + 0.5 * Math.cos(now * 0.00031);
        const bg = VIZ_BACKGROUNDS[currentVisualizerStyle] || VIZ_BACKGROUNDS[0];
        // Clear to the bg color with alpha = bgAlpha (straight, not premul —
        // gl.clear writes straight RGBA and the bridge composite reads it as
        // straight). bgAlpha 0 => (.,.,.,0): the card grid shows fully; higher
        // bgAlpha lays a proportional dark wash over the grid.
        gl.clearColor(bg[0] + bgPulse * 0.010, bg[1] + bgPulse2 * 0.010,
                      bg[2] + smoothedBass * 0.030, vizBgAlpha);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.useProgram(program);
        gl.bindVertexArray(vizVao);
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        const loc = positionLocation < 0 ? 0 : positionLocation;
        gl.enableVertexAttribArray(loc);
        gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
        gl.uniform1f(timeLocation, now * 0.001);
        gl.uniform1f(paletteLocation, currentVisualizerStyle);
        gl.uniform1f(flipYLocation, vizFlipY);

        const scale = audio.paused ? 0.95 : 1.08 + smoothedEnergy * 3.2;

        switch (currentVisualizerStyle) {
          case 0:
            drawRibbon(0.078, [1.00, 0.20, 0.72, 0.105], now, scale * 0.92, 0.4);
            drawRibbon(0.046, [0.22, 0.82, 1.00, 0.190], now, scale * 1.00, 2.2);
            drawRibbon(0.015, [1.00, 0.96, 0.36, 0.900], now, scale * 1.04, 4.0);
            break;
          case 1: drawFrequencyBars(now); break;
          case 2: drawOrbitWave(now, scale); break;
          case 3: drawRadialBars(now); break;
          case 4: drawMirrorWave(now, scale); break;
          case 5: drawSpectrumLine(now); break;
          case 6: drawPulseRings(now); break;
          case 7: drawParticles(now); break;
          case 8: drawNebula(now); break;
          default:
            drawRibbon(0.078, [1.00, 0.20, 0.72, 0.105], now, scale * 0.92, 0.4);
            drawRibbon(0.046, [0.22, 0.82, 1.00, 0.190], now, scale * 1.00, 2.2);
            drawRibbon(0.015, [1.00, 0.96, 0.36, 0.900], now, scale * 1.04, 4.0);
        }

        // Throttled probe (~ every 2s): is the visualizer getting audio data
        // and drawing without GL errors?
        if (now - _vizProbeLast > 2000) {
          _vizProbeLast = now;
          const err = gl.getError() >>> 0;
          plog("[swp] viz frame style=" + currentVisualizerStyle +
               " size=" + vizW + "x" + vizH +
               " freq=" + haveFreq + " wave=" + haveWave +
               " spec0=" + (specData[0] || 0).toFixed(4) +
               " spec8=" + (specData[8] || 0).toFixed(4) +
               " energy=" + smoothedEnergy.toFixed(3) +
               " glErr=0x" + err.toString(16) +
               " paused=" + audio.paused);
        }
      }

      let _vizProbeLast = -10000;

      function startVisualizer() {
        if (vizStarted) return;
        if (!setupVisualizer()) return;
        vizStarted = true;
        requestAnimationFrame(renderVisualizer);
      }

      function runSelfTests() {
        console.assert(playlist.length === 7, "Expected exactly 7 playlist tracks.");
        console.assert(playlist.every((track) => track.url.endsWith(".mp3")), "Every playlist item should be an MP3 URL.");
        console.assert(Boolean(audio && canvas && playBtn && libraryList), "Core player DOM elements should exist.");
        console.assert(typeof formatTime(65) === "string" && formatTime(65) === "1:05", "formatTime should format minutes and seconds correctly.");
        console.assert(wrapIndex(-1) === playlist.length - 1, "wrapIndex should wrap negative indexes.");
        console.assert(wrapIndex(playlist.length) === 0, "wrapIndex should wrap indexes past the playlist length.");
        console.assert(!document.querySelector("#trackTitle"), "The controls should not render track-name text on the left.");
        console.assert(Boolean(vizPrevBtn && vizNextBtn && vizStyleName), "Visualizer selector controls should exist.");
        console.assert(visualizerStyles.length === 9, "Expected exactly 9 visualizer style labels after removing Milkdrop.");
        console.assert(wrapValue(-1, visualizerStyles.length) === visualizerStyles.length - 1, "Visualizer style index should wrap backwards.");
      }

      function buildLibrary() {
        libraryList.innerHTML = "";
        playlist.forEach((track, index) => {
          const button = document.createElement("button");
          button.className = "library-track";
          button.type = "button";
          button.role = "option";
          button.setAttribute("aria-selected", String(index === currentIndex));
          button.innerHTML = `
            <span class="num">${String(index + 1).padStart(2, "0")}</span>
            <strong>${track.title}</strong>
            <span>${track.artist} · ${shortenUrl(track.url)}</span>
          `;
          button.addEventListener("click", () => selectTrack(index, true));
          libraryList.appendChild(button);
        });
        libraryCount.textContent = playlist.length === 1
          ? "1 local track"
          : `${playlist.length} local tracks`;
      }

      function updateLibraryActiveState() {
        [...libraryList.children].forEach((button, index) => {
          const active = index === currentIndex;
          button.classList.toggle("is-active", active);
          button.setAttribute("aria-selected", String(active));
          // Keep the active track on screen when the list overflows (e.g.
          // auto-advance / next that lands on a row scrolled out of view).
          if (active && typeof button.scrollIntoView === "function") {
            button.scrollIntoView();
          }
        });
      }

      function shortenUrl(url) {
        const clean = url.split("/").pop() || url;
        return clean.length > 34 ? `${clean.slice(0, 16)}…${clean.slice(-12)}` : clean;
      }

      function loadTrack(index) {
        currentIndex = wrapIndex(index);
        endedHandled = false;
        announcedIndex = -1;
        audio.src = playlist[currentIndex].url;
        audio.load();
        seek.value = "0";
        setRangeFill(seek, 0);
        currentTimeEl.textContent = "0:00";
        durationEl.textContent = "0:00";
        updateLibraryActiveState();
        setStatus("Ready");
      }

      async function selectTrack(index, shouldPlay) {
        const wasPlaying = !audio.paused;
        loadTrack(index);
        const willPlay = shouldPlay || wasPlaying;
        // Update the transport icon/status synchronously (same reason as
        // togglePlay) so the tap that selected the track also repaints it.
        if (willPlay) markTransport(true);
        if (willPlay) announceTrack();
        if (willPlay) await playAudio();
      }

      function wrapIndex(index) {
        return (index + playlist.length) % playlist.length;
      }

      function randomTrackIndex() {
        if (playlist.length <= 1) return currentIndex;
        let next = currentIndex;
        while (next === currentIndex) next = Math.floor(Math.random() * playlist.length);
        return next;
      }

      async function bootAudioGraph() {
        if (analyserReady) return true;

        try {
          const Context = window.AudioContext || window.webkitAudioContext;
          if (!Context) {
            // Web Audio analysis isn't available in this runtime; playback
            // still works (the visualizer falls back to a synthetic
            // waveform). Stay quiet instead of nagging with a toast on load.
            console.debug("Web Audio API unavailable; analysis disabled, playback unaffected.");
            return false;
          }

          audioContext = audioContext || new Context();
          if (audioContext.state === "suspended") await audioContext.resume();

          if (!sourceNode) {
            sourceNode = audioContext.createMediaElementSource(audio);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            analyser.smoothingTimeConstant = 0.78;
            sourceNode.connect(analyser);
            analyser.connect(audioContext.destination);
            timeData = new Uint8Array(analyser.fftSize);
            freqData = new Uint8Array(analyser.frequencyBinCount);
          }

          analyserReady = true;
          return true;
        } catch (error) {
          // console.error flips nx.js into text-render mode and freezes
          // the canvas — use console.debug. Analysis is optional; keep quiet.
          console.debug("audio graph init failed; analysis disabled:", error);
          return false;
        }
      }

      // This runtime doesn't dispatch HTMLMediaElement "play"/"pause"
      // events (the listeners below never fire) and the rAF UI poll is
      // disabled to keep the page static, so drive the transport UI
      // directly from the tap handlers. STYLE-ONLY: toggle the `.playing`
      // class, which swaps the visible <img> between the play and pause
      // icons via display (no layout change, no full-page rebuild).
      function markTransport(playing) {
        expectPlaying = playing;
        const actionLabel = playing ? "Pause" : "Play";
        playBtn.classList.toggle("playing", playing);
        playBtn.title = actionLabel;
        playBtn.setAttribute("aria-label", actionLabel);
        statusPill.classList.toggle("is-playing", playing);
      }

      async function playAudio() {
        await bootAudioGraph();
        try {
          await audio.play();
        } catch (error) {
          // console.error flips nx.js to text mode + freezes the canvas.
          console.debug("audio.play() rejected:", error);
          setStatus("Blocked");
        }
      }

      function pauseAudio() {
        audio.pause();
      }

      function togglePlay() {
        // Flip the transport UI synchronously here (not after the async
        // audio.play()): the tap handler runs synchronously and the live
        // DOM only repaints off the tap, so a deferred post-await mutation
        // wouldn't show until the next tap/scroll.
        if (audio.paused) { markTransport(true); announceTrack(); playAudio(); }
        else { markTransport(false); pauseAudio(); }
      }

      function nextTrack() {
        const next = isShuffle ? randomTrackIndex() : currentIndex + 1;
        selectTrack(next, !audio.paused || audio.ended);
      }

      function prevTrack() {
        if (audio.currentTime > 3) {
          audio.currentTime = 0;
          return;
        }
        const next = isShuffle ? randomTrackIndex() : currentIndex - 1;
        selectTrack(next, !audio.paused || audio.ended);
      }

      function handleEnded() {
        if (repeatMode === 2) {            // repeat one
          endedHandled = false;
          audio.currentTime = 0;
          markTransport(true);
          playAudio();
          return;
        }
        if (currentIndex === playlist.length - 1 && !isShuffle && repeatMode === 0) {
          setStatus("Finished");
          markTransport(false);
          return;
        }
        // Auto-advance always keeps playing (the previous track was
        // playing and finished); honor shuffle, else go to the next index
        // (loadTrack wraps, so repeat-all loops past the last track).
        const next = isShuffle ? randomTrackIndex() : currentIndex + 1;
        selectTrack(next, true);
      }

      function setStatus(label) {
        statusText.textContent = label;
        statusPill.classList.toggle("is-playing", label === "Playing");
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 5200);
      }

      function setRangeFill(input, fraction) {
        const bounded = Math.max(0, Math.min(1, Number.isFinite(fraction) ? fraction : 0));
        input.style.setProperty("--fill", `${bounded * 100}%`);
      }

      function formatTime(seconds) {
        if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${String(secs).padStart(2, "0")}`;
      }

      function updateTimeline() {
        const duration = audio.duration || 0;
        const current = audio.currentTime || 0;
        if (!seeking) {
          const fraction = duration ? current / duration : 0;
          seek.value = String(Math.round(fraction * Number(seek.max)));
          setRangeFill(seek, fraction);
        }
        currentTimeEl.textContent = formatTime(current);
        durationEl.textContent = formatTime(duration);
      }

      // Style-only: toggle the highlight class + update title/aria (which
      // don't paint). The button keeps its static "Vol" / "Repeat" label and
      // its box, so a mute/repeat tap patches as one small region.
      function updateMuteButton() {
        const isMuted = audio.muted || audio.volume === 0;
        muteBtn.classList.toggle("is-active", isMuted);
        muteBtn.title = isMuted ? "Unmute" : "Mute";
        muteBtn.setAttribute("aria-label", isMuted ? "Unmute" : "Mute");
      }

      function updateRepeatButton() {
        repeatBtn.classList.toggle("is-active", repeatMode !== 0);
        const labels = ["Repeat: off", "Repeat: all", "Repeat: one"];
        repeatBtn.title = labels[repeatMode];
        repeatBtn.setAttribute("aria-label", labels[repeatMode]);
      }

      function updateVisualizerSelector() {
        const styleName = visualizerStyles[currentVisualizerStyle];
        vizStyleName.textContent = styleName;
        vizPrevBtn.title = `Previous visualizer: ${styleName}`;
        vizNextBtn.title = `Next visualizer: ${styleName}`;
      }

      function changeVisualizerStyle(direction) {
        currentVisualizerStyle = wrapValue(currentVisualizerStyle + direction, visualizerStyles.length);
        updateVisualizerSelector();
        showToast(`${visualizerStyles[currentVisualizerStyle]} visualizer`);
      }

      function wrapValue(value, length) {
        return (value + length) % length;
      }

      function resizeCanvas() {
        // Static canvas placeholder; no rendering loop is used.
      }

      playBtn.addEventListener("click", togglePlay);
      prevBtn.addEventListener("click", prevTrack);
      nextBtn.addEventListener("click", nextTrack);

      shuffleBtn.addEventListener("click", () => {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle("is-active", isShuffle);
        shuffleBtn.setAttribute("aria-pressed", String(isShuffle));
        showToast(isShuffle ? "Shuffle on" : "Shuffle off");
      });

      repeatBtn.addEventListener("click", () => {
        repeatMode = (repeatMode + 1) % 3;
        updateRepeatButton();
        showToast(repeatMode === 0 ? "Repeat off" : repeatMode === 1 ? "Repeat all" : "Repeat one");
      });

      muteBtn.addEventListener("click", () => {
        audio.muted = !audio.muted;
        updateMuteButton();
      });

      volume.addEventListener("input", () => {
        audio.volume = Number(volume.value);
        audio.muted = audio.volume === 0;
        setRangeFill(volume, audio.volume);
        updateMuteButton();
      });

      vizPrevBtn.addEventListener("click", () => changeVisualizerStyle(-1));
      vizNextBtn.addEventListener("click", () => changeVisualizerStyle(1));

      seek.addEventListener("pointerdown", () => { seeking = true; });
      seek.addEventListener("pointerup", () => { seeking = false; });
      seek.addEventListener("change", () => { seeking = false; });
      seek.addEventListener("input", () => {
        const fraction = Number(seek.value) / Number(seek.max);
        setRangeFill(seek, fraction);
        const duration = audio.duration || 0;
        if (duration > 0) {
          const target = fraction * duration;
          currentTimeEl.textContent = formatTime(target);
          audio.currentTime = target;
        }
      });

      // (These never fire on Citron — the engine doesn't dispatch media
      // events — but keep them consistent with the style-only transport UI.)
      audio.addEventListener("play", () => markTransport(true));
      audio.addEventListener("pause", () => markTransport(false));

      audio.addEventListener("waiting", () => setStatus("Buffering"));
      audio.addEventListener("canplay", () => { if (!audio.paused) setStatus("Playing"); });
      audio.addEventListener("loadedmetadata", updateTimeline);
      audio.addEventListener("durationchange", updateTimeline);
      audio.addEventListener("timeupdate", updateTimeline);
      audio.addEventListener("ended", handleEnded);
      audio.addEventListener("error", () => {
        setStatus("Error");
        showToast("This track could not be loaded. Check your internet connection or the remote MP3 URL.");
      });

      document.addEventListener("keydown", (event) => {
        const tag = document.activeElement?.tagName?.toLowerCase();
        const editing = tag === "input" || tag === "textarea";
        if (editing) return;

        if (event.code === "Space") {
          event.preventDefault();
          togglePlay();
        } else if (event.key === "ArrowRight") {
          audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5);
        } else if (event.key === "ArrowLeft") {
          audio.currentTime = Math.max(0, audio.currentTime - 5);
        } else if (event.key === "ArrowUp") {
          event.preventDefault();
          audio.volume = Math.min(1, audio.volume + 0.05);
          volume.value = String(audio.volume);
          setRangeFill(volume, audio.volume);
          updateMuteButton();
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          audio.volume = Math.max(0, audio.volume - 0.05);
          volume.value = String(audio.volume);
          setRangeFill(volume, audio.volume);
          updateMuteButton();
        } else if (event.key.toLowerCase() === "n") {
          nextTrack();
        } else if (event.key.toLowerCase() === "p") {
          prevTrack();
        }
      });

      window.addEventListener("resize", resizeCanvas);

      // The runtime doesn't dispatch HTMLMediaElement timeupdate/ended
      // events, so drive the seek bar + time labels + auto-advance from a
      // light throttled poll (4 Hz). It only mutates the DOM while actually
      // playing, so a paused/idle page stays static; the live-DOM partial
      // repaint patches just the seek + time regions per update.
      function startUiPoll() {
        if (uiPollTimer) return;
        let lastPollC = -1;
        let stallCount = 0;
        let tlCounter = 0;
        const tick = () => {
          try {
            const d = audio.duration || 0;
            const c = audio.currentTime || 0;
            // Count consecutive polls with no playback progress.
            if (c > lastPollC + 0.05) stallCount = 0;
            else if (c + 1 < lastPollC) stallCount = 0; // new track / seek back
            else stallCount++;
            lastPollC = c;
            // Re-arm the finish latch once we're clearly away from the end
            // (fresh track, seek back, repeat-one restart).
            if (d > 0 && c < d - 5) endedHandled = false;
            // This runtime ends a track a second or two BEFORE the reported
            // duration, and stops by pausing or just freezing currentTime
            // (rarely setting `audio.ended`). So treat "near the end AND
            // playback has stopped progressing" as finished. Gated on
            // expectPlaying so a manual pause never advances the track.
            const nearEnd = d > 0 && (c >= d - 4 || c >= d * 0.85);
            const stopped = audio.ended || audio.paused || stallCount >= 2;
            if (expectPlaying && nearEnd && stopped && !endedHandled) {
              endedHandled = true;
              handleEnded();
            } else if (!audio.paused) {
              // Throttle the DOM-mutating timeline refresh to ~1 Hz. Each
              // call bumps the live-tree version, which forces a partial
              // repaint AND a re-render of the library scroll-cache; at the
              // old 4 Hz that tanked the visualizer FPS during playback.
              // 1 s time/seek granularity is standard for a player, and the
              // end-detection above still runs every 250 ms.
              if ((tlCounter++ & 3) === 0) updateTimeline();
            }
          } catch (_) { /* keep polling regardless */ }
          uiPollTimer = setTimeout(tick, 250);
        };
        uiPollTimer = setTimeout(tick, 250);
      }

      function init() {
        try {
          plog("[swp] init begin");
          loadPlaylistFromConfig();
          plog("[swp] playlist=" + playlist.length);
          runSelfTests();
          plog("[swp] selfTests ok");
          buildLibrary();
          plog("[swp] library built");
          if (playlist.length > 0) loadTrack(0);
          else setStatus("No audio files found");
          audio.volume = Number(volume.value);
          setRangeFill(volume, audio.volume);
          updateMuteButton();
          updateRepeatButton();
          updateVisualizerSelector();
          startUiPoll();
          plog("[swp] uiPoll started");
          startVisualizer();
          plog("[swp] init end (visualizer started)");
        } catch (e) {
          // console.debug only — console.error flips nx.js to text mode.
          const msg = e && e.message ? e.message : String(e);
          console.debug("[swp] init threw:", msg);
          plog("[swp] init THREW: " + msg + " @ " + (e && e.stack ? e.stack.slice(0, 200) : "?"));
        }
      }

      init();
    })();
  </script>
</body>
</html>
